<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#050c18">
<title>Půjde plachtit?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;color:#1a2540;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}

/* LOADING / ERROR */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;background:#f0f4f8}
#errbox{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center;background:#f0f4f8}
#app{display:none;max-width:520px;margin:0 auto;padding-bottom:60px}
.spin{width:40px;height:40px;border:3px solid #dde3ed;border-top-color:#2563eb;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase}
.emsg{font-size:13px;color:#64748b;line-height:1.7;max-width:320px;word-break:break-all}
.btn{padding:11px 24px;border-radius:10px;background:#2563eb;color:#fff;font-weight:700;font-size:13px;border:none;cursor:pointer}

/* HEADER */
header{padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;background:rgba(255,255,255,.97);backdrop-filter:blur(14px);z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.ttl{font-size:17px;font-weight:800;letter-spacing:1px;color:#1a2540}
.hsub{font-size:9px;color:#94a3b8;letter-spacing:3px;margin-top:2px;text-transform:uppercase}
.lbtn{display:flex;align-items:center;gap:5px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:18px;padding:6px 12px;cursor:pointer;font-size:11px;color:#2563eb;font-weight:600;max-width:155px;white-space:nowrap;overflow:hidden}
.lbtn span{overflow:hidden;text-overflow:ellipsis}

/* META ROW */
.meta{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 0}
.upd{font-size:9px;color:#94a3b8;letter-spacing:1px}
.ref{background:#fff;border:1px solid #e2e8f0;color:#64748b;border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer;transition:.15s}
.ref:hover{border-color:#2563eb;color:#2563eb}

/* SECTIONS */
.sec{padding:14px 18px 0}
.slbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#94a3b8;margin-bottom:10px}

/* DAY STRIP */
.strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.strip::-webkit-scrollbar{height:3px}
.strip::-webkit-scrollbar-thumb{background:#dde3ed;border-radius:2px}
.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 9px;min-width:62px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;cursor:pointer;color:inherit;outline:none;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.chip.on{background:#eff6ff;border-color:#93c5fd;box-shadow:0 2px 12px rgba(37,99,235,.12)}
.chip:hover{border-color:#93c5fd}
.cl{font-size:9px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
.ci{font-size:20px}
.cs{font-size:17px;font-weight:800;line-height:1}
.ct{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px}
.cx{font-size:10px;color:#1a2540}

/* CHART */
.cbox{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px 14px 10px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.cbars{display:flex;align-items:flex-end;gap:5px;height:68px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bv{font-size:9px;font-weight:700}
.bb{width:100%;border-radius:4px 4px 0 0;transition:all .3s}
.bdays{display:flex;gap:5px;margin-top:4px}
.bd{flex:1;text-align:center;font-size:9px}

/* HERO */
.hero{background:#fff;border:1.5px solid #e2e8f0;border-radius:20px;padding:20px;position:relative;overflow:hidden;transition:border-color .3s;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.htop{display:flex;align-items:center;margin-bottom:14px}
.hday{font-size:28px;font-weight:800;color:#1a2540;flex:1;letter-spacing:.5px}
.hico{font-size:36px}
.hvd{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.tbig{font-size:40px;font-weight:800;color:#ea6c00;line-height:1}
.tsub{font-size:11px;color:#94a3b8;margin-top:3px}

/* GAUGE GRID */
.gg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.gb{background:#f8fafc;border:1px solid #e2e8f0;border-radius:13px;padding:11px 13px}
.gl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:6px}
.gv{font-size:22px;font-weight:800;line-height:1}
.gu{font-size:10px;color:#94a3b8;margin-left:2px}
.gs{font-size:10px;color:#b0bcd0;margin-top:3px}
.bt{background:#e9eff6;border-radius:3px;height:5px;overflow:hidden;margin-top:7px}
.bf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.tbrs{display:flex;gap:3px;align-items:flex-end;margin-top:6px}
.tbr{width:8px;border-radius:3px}
.wrow{display:flex;align-items:center;gap:10px;margin-top:5px}

/* THERMAL BOX */
.thbox{grid-column:span 2;background:linear-gradient(135deg,#f0fdf4,#f0f9ff);border:1.5px solid #86efac;border-radius:13px;padding:14px 13px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.thitem{text-align:center}
.thval{font-size:20px;font-weight:800;line-height:1}
.thlbl{font-size:8px;color:#64748b;letter-spacing:1px;margin-top:4px;text-transform:uppercase}


/* MODAL */
#ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
#ov.open{display:flex}
#modal{width:100%;max-width:520px;background:#fff;border-top-left-radius:22px;border-top-right-radius:22px;padding:26px 18px 40px;position:relative;animation:slideup .25s ease;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
@keyframes slideup{from{transform:translateY(50px);opacity:0}to{transform:none;opacity:1}}
.mtitle{font-size:17px;font-weight:800;color:#1a2540;margin-bottom:3px}
.msub{font-size:11px;color:#64748b;margin-bottom:16px}
.mrow{display:flex;gap:8px;margin-bottom:12px}
.mi{flex:1;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:11px;padding:11px 14px;color:#1a2540;font-size:14px;outline:none;transition:border-color .2s}
.mi:focus{border-color:#2563eb}
.mi::placeholder{color:#94a3b8}
.mb{background:#2563eb;color:#fff;border:none;border-radius:11px;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.mb:disabled{opacity:.5}
.mrs{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.mr{background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:11px 14px;cursor:pointer;transition:background .15s}
.mr:hover{background:#eff6ff;border-color:#bfdbfe}
.mrn{font-size:14px;font-weight:600;color:#1a2540}
.mrd{font-size:11px;color:#64748b;margin-top:2px}
.mre{font-size:13px;color:#64748b;text-align:center;padding:18px 0}
.mgps{width:100%;margin-top:10px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:11px;padding:10px;color:#2563eb;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.mgps:hover{background:#eff6ff}
.mclose{position:absolute;top:15px;right:17px;background:none;border:none;color:#94a3b8;font-size:21px;cursor:pointer;padding:3px;line-height:1}
</style>
</head>

  <!-- Fuselage -->

<script>
var days=[], sel=0;
var lat=49.2489, lon=14.7203, locName='Letiště Soběslav';
var DS=['Ne','Po','Út','St','Čt','Pá','So'];
var DF=['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
function el(id){return document.getElementById(id)}
function showLoading(m){el('loading').style.display='flex';el('errbox').style.display='none';el('app').style.display='none';if(m)el('lmsg').textContent=m}
function showApp(){el('loading').style.display='none';el('errbox').style.display='none';el('app').style.display='block'}
function showError(m){el('loading').style.display='none';el('errbox').style.display='flex';el('emsg').textContent=m}
function avg(a){var s=0,n=0;for(var i=0;i<a.length;i++){if(a[i]!=null&&!isNaN(a[i])){s+=a[i];n++;}}return n?s/n:0}

/* THERMAL CALCULATION - fyzikalne spravna metoda pro vetronare
   Zakladna termiky (m) = (T_surface - T_rosny_bod) * 122
   T_rosny_bod se odhaduje z relativni vlhkosti: Td = T - (100-RH)/5
   Spread = T - Td = (100 - RH) / 5
   Zakladna = spread * 122                                          */
function calcThermal(tmax, rhArr, blhArr, capeArr, t12, td12) {
  var rh = rhArr.length ? avg(rhArr) : 60;

  // LCL zakladna: pouzij T(12Z) - Td(12Z) pro zakladnu ve 12Z
  // Rosny bod je relativne stabilni pres den
  var spread;
  if(t12!=null && td12!=null) {
    spread = t12 - td12;           // presny spread ve 12Z
  } else if(t12!=null) {
    spread = (100 - rh) / 5;       // odhad spreadu z RH (Alduchov-Eskridge)
  } else {
    spread = (100 - rh) / 5;
  }
  spread = Math.max(0, spread);

  // Maximalni zakladna odpoledne = (Tmax - Td12Z) * 122
  var spreadMax = (td12!=null) ? Math.max(0, tmax - td12) : spread + (tmax - (t12||tmax));
  spreadMax = Math.max(spread, spreadMax);

  // LCL ve 12Z (m) = spread * 122
  var tbBySpread = Math.round(spread * 122);
  // Max LCL dne (odpoledne)
  var tbMax = Math.round(spreadMax * 122);

  // Pouzij boundary layer height pokud je k dispozici a rozumna
  var blhVal = blhArr.length ? avg(blhArr) : 0;
  var tbByBlh = (blhVal > 200 && blhVal < 5000) ? Math.round(blhVal) : 0;

  // Zakladna: BLH pokud dostupna, jinak max z LCL12Z a LCLmax
  var tb = tbByBlh > 300 ? tbByBlh : Math.max(tbBySpread, tbMax);
  tb = Math.max(150, Math.min(3500, tb));

  // Síla termiky 0-5
  var cape = capeArr.length ? avg(capeArr) : 0;
  var tsSpread = Math.min(spread / 3.5, 1.5);
  var tsTemp   = tmax >= 28 ? 1.5 : tmax >= 22 ? 1.0 : tmax >= 16 ? 0.5 : 0;
  var tsCape   = Math.min(cape / 600, 1.5);
  var tsBlh    = tbByBlh > 300 ? Math.min(tbByBlh / 800, 1.5) : 0;
  var ts = tsSpread + tsTemp + (tsBlh > 0 ? tsBlh : tsCape);
  ts = Math.max(0, Math.min(5, ts));

  // Predikce Cu oblaku
  // Cu vznikaji kdyz: termika dosahne LCL (zakladnu) a je dostatek vlhkosti
  // spread < 8°C  -> vlhky vzduch -> Cu velmi pravdepodobne
  // spread 8-15°C -> mirne vlhky -> Cu mozna
  // spread > 15°C -> suchy vzduch -> modra termika (bez oblaku)
  // Teplota musi byt > 12°C a termika aktivni
  var cuProb, cuLabel, cuColor;
  if(tmax < 12 || ts < 0.5) {
    cuProb = 0; cuLabel = 'Ne'; cuColor = '#ff3d5a';
  } else if(spread < 8 && ts >= 1.5) {
    cuProb = 3; cuLabel = 'Ano'; cuColor = '#00e676';
  } else if(spread < 12 && ts >= 1.0) {
    cuProb = 2; cuLabel = 'Možná'; cuColor = '#ffd740';
  } else if(spread >= 12) {
    cuProb = 1; cuLabel = 'Modrá termika'; cuColor = '#5badff';
  } else {
    cuProb = 1; cuLabel = 'Málo'; cuColor = '#ff9100';
  }

  // Průměrná rychlost stoupání v termice (m/s) - empiricky odhad
  // Zalozeno na CAPE a vysce zakladny: silnejsi termika = vyssi zakladna = vetsi CAPE
  var wstar;
  if(cape > 0) {
    // Fyzikalni odhad: w* = cbrt(g/T * H * w_heat)
    // Zjednoduseny vzorec: w_avg ≈ 0.4 * cbrt(CAPE) pro stredni termiku
    wstar = Math.round(0.4 * Math.pow(cape, 1/3) * 10) / 10;
  } else {
    // Z ts skaly (0-5): empiricky
    wstar = Math.round((0.3 + 0.65 * ts) * 10) / 10;
  }
  wstar = Math.max(0, Math.min(6, wstar));

  return {
    tb: tb, ts: ts, tbMax: tbMax, wstar: wstar,
    spread: Math.round(spread*10)/10,
    cape: Math.round(cape), rh: Math.round(rh),
    cuLabel: cuLabel, cuColor: cuColor, cuProb: cuProb
  };
}

function score(d){
  // Diskvalifikacni podminky -> skore 0
  if(d.rain>=40 && d.cloud>=70 && d.vis<5) return 0;
  if(d.rain>=60) return 0;
  if(d.vis<2) return 0;
  if(d.cloud>=90 && d.vis<3) return 0;

  // 100 = idealni podminky: silna termika + Cu oblaky + mirny vitr
  var s=0;
  s += (d.ts/5)*40;
  if(d.cuProb===3) s+=25;
  else if(d.cuProb===2) s+=15;
  else if(d.cuProb===1) s+=5;
  var w=d.wind;
  if(w>=8&&w<=20) s+=20;
  else if(w>20&&w<=28) s+=14;
  else if(w>=3&&w<8) s+=10;
  else if(w>28&&w<=35) s+=5;
  else if(w<3) s+=7;
  s += Math.max(0, 10-d.rain*0.12);
  s += Math.min(d.vis/5, 5);
  return Math.max(0, Math.min(100, Math.round(s)));
}
function verd(s){
  if(s>=78)return{l:'Výborné',  c:'#00e676',bg:'rgba(0,230,118,.12)'};
  if(s>=60)return{l:'Dobré',    c:'#ffd740',bg:'rgba(255,215,64,.10)'};
  if(s>=40)return{l:'Slabé',    c:'#ff9100',bg:'rgba(255,145,0,.10)'};
  return          {l:'Nelétejte',c:'#ff3d5a',bg:'rgba(255,61,90,.10)'};
}
function wico(c){
  if(c===0)return'&#9728;';if(c<=2)return'&#127780;';if(c===3)return'&#9729;';
  if(c<=49)return'&#127787;';if(c<=67)return'&#127783;';if(c<=77)return'&#10052;';
  if(c<=82)return'&#127782;';return'&#9928;';
}
function wdl(d){return['S','SSV','SV','VSV','V','VJV','JV','JJV','J','JJZ','JZ','ZJZ','Z','ZSZ','SZ','SSZ'][Math.round(d/22.5)%16]}
function ring(s,c){
  var r=33,ci=2*Math.PI*r,d=s/100*ci;
  return '<div style="position:relative;width:84px;height:84px;flex-shrink:0">'
    +'<svg width="84" height="84" viewBox="0 0 84 84" style="transform:rotate(-90deg)">'
    +'<circle cx="42" cy="42" r="'+r+'" fill="none" stroke="#e9eff6" stroke-width="8"/>'
    +'<circle cx="42" cy="42" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="8" stroke-dasharray="'+d+' '+ci+'" stroke-linecap="round" style="filter:drop-shadow(0 0 6px '+c+')"/>'
    +'</svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
    +'<span style="font-size:21px;font-weight:800;color:'+c+';line-height:1">'+s+'</span>'
    +'<span style="font-size:8px;color:#4a6180">/100</span></div></div>';
}
function arrow(deg){
  // Wind direction = odkud vane vitr (meteorologicka konvence)
  // Sipka ukazuje ODKUD vane vitr (otocena o 180 vuci smeru pohybu vzduchu)
  var d = (deg + 180) % 360;
  return '<svg width="30" height="30" viewBox="0 0 30 30">'
    +'<circle cx="15" cy="15" r="13" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>'
    +'<g transform="rotate('+d+',15,15)"><polygon points="15,3 18.5,16 15,13 11.5,16" fill="#2563eb" style="filter:drop-shadow(0 0 3px #93c5fd)"/></g></svg>';
}
function tbars(ts){
  var h='<div class="tbrs">';
  for(var i=0;i<5;i++){
    var lit=i<Math.round(ts),ht=9+i*7;
    h+='<div class="tbr" style="height:'+ht+'px;background:'+(lit?'#16a34a':'#e9eff6')+';box-shadow:'+(lit?'0 0 6px #00e67655':'none')+'"></div>';
  }
  return h+'</div>';
}
function bar(pct,col){
  return '<div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%;background:linear-gradient(90deg,'+col+'66,'+col+')"></div></div>';
}

function render(){
  // Strip
  var s2=el('strip'); s2.innerHTML='';
  days.forEach(function(d,i){
    var s=score(d),v=verd(s);
    var b=document.createElement('button');
    b.className='chip'+(i===sel?' on':'');
    b.innerHTML='<span class="cl">'+d.lbl+'</span>'
      +'<span class="ci">'+wico(d.code)+'</span>'
      +'<span class="cs" style="color:'+v.c+'">'+s+'</span>'
      +'<span class="ct" style="background:'+v.bg+';color:'+v.c+'">'+v.l+'</span>'
      +'<span class="cx">'+d.tmax+'&#176;C</span>';
    b.onclick=function(){sel=i;render();};
    s2.appendChild(b);
  });
  // Chart
  var bw=el('cbars'),bd=el('bdays'); bw.innerHTML=''; bd.innerHTML='';
  days.map(score).forEach(function(s,i){
    var v=verd(s),h=Math.max(4,Math.round(s/100*64)),a=i===sel;
    var col=document.createElement('div'); col.className='bc';
    col.innerHTML='<span class="bv" style="color:'+(a?v.c:v.c+'55')+'">'+s+'</span>'
      +'<div class="bb" style="height:'+h+'px;background:'+(a?'linear-gradient(180deg,'+v.c+','+v.c+'88)':'linear-gradient(180deg,'+v.c+'44,'+v.c+'18)')+';'+(a?'box-shadow:0 0 12px '+v.c+'44':'')+'"></div>';
    col.onclick=function(){sel=i;render();};
    bw.appendChild(col);
    var lbl=document.createElement('div'); lbl.className='bd';
    lbl.style.color=i===sel?'#c8daf0':'#4a6180';
    lbl.textContent=days[i].lbl; bd.appendChild(lbl);
  });
  // Hero
  var d=days[sel], s=score(d), v=verd(s);
  var vc=d.vis>=10?'#00e676':d.vis>=5?'#ffd740':'#ff3d5a';
  var wc=d.wind<=20?'#00e676':d.wind<=30?'#ffd740':'#ff3d5a';
  var rc=d.rain<20?'#4a6180':d.rain<50?'#ffd740':'#ff3d5a';
  var tbc=d.tb>1500?'#00e676':d.tb>900?'#ffd740':'#ff9100';
  el('hlbl').textContent='Detail — '+d.full;
  el('hero').style.borderColor=v.c+'44';
  el('hero').innerHTML=
    '<div class="htop"><div class="hday">'+d.full+'</div><span style="font-size:38px">'+wico(d.code)+'</span></div>'
    +'<div class="hvd" style="background:'+v.bg+';color:'+v.c+'">'+v.l+'</div>'
    +'<div class="srow">'+ring(s,v.c)
      +'<div><div class="tbig">'+d.tmax+'&#176;C</div><div class="tsub">min '+d.tmin+'&#176;C</div></div></div>'
    +'<div class="gg">'
    // Thermal summary box (full width)
    +'<div class="thbox">'
      // Row 1: Zakladna 12Z + Max zakladna + Cu oblaky
      +'<div class="thitem">'
        +'<div class="thval" style="color:'+tbc+'">'+d.tb+'</div>'
        +'<div class="thlbl">Základna 12Z (m)</div>'
      +'</div>'
      +'<div class="thitem">'
        +'<div class="thval" style="color:#16a34a">'+(d.tbMax||d.tb)+'</div>'
        +'<div class="thlbl">Max základna (m)</div>'
      +'</div>'
      +'<div class="thitem">'
        +'<div class="thval" style="color:'+d.cuColor+'">'+d.cuLabel+'</div>'
        +'<div class="thlbl">Cu oblaky</div>'
      +'</div>'
    +'</div>'
    // Row 2: Sila termiky + stoupani
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px">'
      +'<div class="gb" style="text-align:center">'
        +'<div class="gl">Síla termiky</div>'
        +tbars(d.ts)
        +'<div class="gs" style="margin-top:4px">'+d.ts.toFixed(1)+' / 5.0</div>'
      +'</div>'
      +'<div class="gb" style="text-align:center">'
        +'<div class="gl">Průměrné stoupání</div>'
        +'<div style="margin-top:4px"><span class="gv" style="color:#2563eb">'+d.wstar+'</span><span class="gu">m/s</span></div>'
        +'<div class="gs">průměr v termice</div>'
      +'</div>'
    +'</div>'
    
    // Wind
    +'<div class="gb"><div class="gl">Vítr</div>'
      +'<div class="wrow">'+arrow(d.wdir)
        +'<div><span class="gv" style="color:'+wc+'">'+d.wind+'</span><span class="gu">km/h</span>'
        +'<div class="gs">'+wdl(d.wdir)+'</div></div></div>'
      +bar(Math.min(d.wind/60*100,100),wc)+'</div>'
    // Cloud
    +'<div class="gb"><div class="gl">Oblačnost</div>'
      +'<div><span class="gv" style="color:#ffd740">'+d.cloud+'</span><span class="gu">%</span></div>'
      +bar(d.cloud,'#ffd740')
      +'<div class="gs" style="margin-top:4px">Vlhkost: '+d.rh+'%</div>'
    +'</div>'
    // Visibility
    +'<div class="gb"><div class="gl">Dohlednost</div>'
      +'<div><span class="gv" style="color:'+vc+'">'+d.vis+'</span><span class="gu">km</span></div>'
      +bar(Math.min(d.vis/25*100,100),vc)+'</div>'
    // Rain
    +'<div class="gb"><div class="gl">Srážky</div>'
      +'<div><span class="gv" style="color:'+rc+'">'+d.rain+'</span><span class="gu">%</span></div>'
      +bar(d.rain,'#ff3d5a')+'</div>'
    +'</div>';
}

/* API - pouzivame icon_eu (DWD) pro nejlepsi pokryti stredni Evropy */
function loadWeather(){
  showLoading('Načítám počasí...');

  // URL 1: best_match - denni data + srazky (ensemble)
  var urlMain='https://api.open-meteo.com/v1/forecast'
    +'?latitude='+lat+'&longitude='+lon
    +'&daily=weather_code,temperature_2m_max,temperature_2m_min'
    +',wind_speed_10m_max,wind_direction_10m_dominant'
    +',precipitation_probability_max,precipitation_sum,cloud_cover_mean'
    +'&hourly=relative_humidity_2m,dew_point_2m,temperature_2m,boundary_layer_height,cape,visibility,precipitation_probability'
    +'&wind_speed_unit=kmh&timezone=UTC&forecast_days=5';

  // URL 2: icon_d2 - vysoka presnost pro termiku ve stredni Evrope
  var urlTherm='https://api.open-meteo.com/v1/forecast'
    +'?latitude='+lat+'&longitude='+lon
    +'&hourly=temperature_2m,dew_point_2m,boundary_layer_height,cape'
    +'&timezone=UTC&forecast_days=5&models=icon_d2';

  Promise.all([fetch(urlMain), fetch(urlTherm)])
    .then(function(responses){
      if(!responses[0].ok) return responses[0].text().then(function(t){throw new Error(responses[0].status+': '+t.slice(0,150));});
      return Promise.all([responses[0].json(), responses[1].ok ? responses[1].json() : null]);
    })
    .then(function(results){
      var data=results[0], dataTherm=results[1];
      var dl=data.daily, hl=data.hourly, n=dl.time.length;
      // Pokud mame icon_d2 data, pouzijeme je pro termiku
      var hlT = (dataTherm && dataTherm.hourly) ? dataTherm.hourly : null;

      days=[];
      for(var i=0;i<n;i++){
        var h0=i*24;
        // Najdi presny index pro 12:00 UTC daneho dne podle hl.time
        var target12 = dl.time[i]+'T12:00';
        var h12 = h0+12;
        if(hl.time) {
          for(var hi=h0;hi<h0+24&&hi<hl.time.length;hi++){
            if(hl.time[hi]&&hl.time[hi].indexOf(target12)===0){h12=hi;break;}
          }
        }
        var rhArr=[], blhArr=[], capeArr=[], visArr=[];
        var t12=null, td12=null;
        // Termicke hodnoty: preferuj icon_d2, fallback best_match
        if(hlT) {
          if(hlT.temperature_2m&&hlT.temperature_2m[h12]!=null) t12=hlT.temperature_2m[h12];
          if(hlT.dew_point_2m&&hlT.dew_point_2m[h12]!=null) td12=hlT.dew_point_2m[h12];
          if(hlT.boundary_layer_height&&hlT.boundary_layer_height[h12]!=null) blhArr.push(hlT.boundary_layer_height[h12]);
          if(hlT.cape&&hlT.cape[h12]!=null) capeArr.push(hlT.cape[h12]);
        }
        // Fallback na best_match pokud icon_d2 nema data
        if(t12==null && hl.temperature_2m&&hl.temperature_2m[h12]!=null) t12=hl.temperature_2m[h12];
        if(td12==null && hl.dew_point_2m&&hl.dew_point_2m[h12]!=null) td12=hl.dew_point_2m[h12];
        if(blhArr.length===0 && hl.boundary_layer_height&&hl.boundary_layer_height[h12]!=null) blhArr.push(hl.boundary_layer_height[h12]);
        if(capeArr.length===0 && hl.cape&&hl.cape[h12]!=null) capeArr.push(hl.cape[h12]);
        if(hl.relative_humidity_2m&&hl.relative_humidity_2m[h12]!=null) rhArr.push(hl.relative_humidity_2m[h12]);
        if(hl.visibility&&hl.visibility[h12]!=null) visArr.push(hl.visibility[h12]);

        var tmax=dl.temperature_2m_max[i]||15;
        var th=calcThermal(tmax, rhArr, blhArr, capeArr, t12, td12);
        var date=new Date(dl.time[i]+'T12:00:00');
        var dow=date.getDay();
        days.push({
          lbl:  i===0?'Dnes':i===1?'Zítra':DS[dow],
          full: i===0?'Dnes':i===1?'Zítra':DF[dow],
          code: dl.weather_code[i]||0,
          tmax: Math.round(tmax),
          tmin: Math.round(dl.temperature_2m_min[i]||5),
          wind: Math.round((dl.wind_speed_10m_max[i]||0) / 3.6 * 10) / 10, // m/s
          wdir: Math.round(dl.wind_direction_10m_dominant[i]||0),
          rain: (function(){
            var hp=hl.precipitation_probability&&hl.precipitation_probability[h12];
            var dp=dl.precipitation_probability_max&&dl.precipitation_probability_max[i];
            var val=Math.max(hp||0, dp||0);
            var ps=dl.precipitation_sum&&dl.precipitation_sum[i]||0;
            if(ps>0.5 && val<30) val=Math.max(val,30);
            if(ps>2 && val<50) val=Math.max(val,50);
            return Math.round(val);
          })(),
          cloud:Math.round(dl.cloud_cover_mean[i]||50),
          vis:  visArr.length?Math.round(avg(visArr)/100)/10:15,
          tb:th.tb, ts:th.ts, tbMax:th.tbMax, wstar:th.wstar, spread:th.spread, cape:th.cape, rh:th.rh,
          cuLabel:th.cuLabel, cuColor:th.cuColor, cuProb:th.cuProb
        });
      }
      sel=0;
      var now=new Date();
      el('upd').textContent='Aktualizováno: '
        +now.getHours().toString().padStart(2,'0')+':'
        +now.getMinutes().toString().padStart(2,'0');
      render(); showApp();
    })
    .catch(function(e){
      console.warn('API chyba, pouzivam demo data:', e.message);
      loadDemoData();
    });
}
}

/* MODAL */
function openModal(){el('ov').classList.add('open');el('mrs').innerHTML='';el('mi').value='';setTimeout(function(){el('mi').focus();},200)}
function closeModal(){el('ov').classList.remove('open')}
el('mi').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});
function doSearch(){
  var q=el('mi').value.trim(); if(!q)return;
  var btn=el('mbtn'),res=el('mrs');
  btn.disabled=true; btn.textContent='...';
  res.innerHTML='<div class="mre">Hledám...</div>';
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=7&accept-language=cs')
    .then(function(r){return r.json()})
    .then(function(data){
      if(!data.length){res.innerHTML='<div class="mre">Žádné výsledky.</div>';return}
      res.innerHTML='';
      data.forEach(function(item){
        var parts=item.display_name.split(',');
        var div=document.createElement('div'); div.className='mr';
        div.innerHTML='<div class="mrn">'+parts[0].trim()+'</div><div class="mrd">'+parts.slice(1,3).join(',').trim()+'</div>';
        div.onclick=function(){closeModal();lat=parseFloat(item.lat);lon=parseFloat(item.lon);locName=parts[0].trim();el('locname').textContent=locName;loadWeather()};
        res.appendChild(div);
      });
    })
    .catch(function(){res.innerHTML='<div class="mre">Chyba připojení.</div>'})
    .finally(function(){btn.disabled=false;btn.textContent='Hledat'});
}
function useGPS(){
  closeModal(); showLoading('Zjišťuji GPS...');
  if(!navigator.geolocation){loadWeather();return}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      lat=pos.coords.latitude; lon=pos.coords.longitude;
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=cs')
        .then(function(r){return r.json()})
        .then(function(d){var a=d.address;locName=a.city||a.town||a.village||a.municipality||'GPS';el('locname').textContent=locName})
        .catch(function(){})
        .finally(function(){loadWeather()});
    },
    function(){loadWeather()},{timeout:7000}
  );
}
function loadDemoData(){
  var today=new Date();
  var raw=[
    {code:0, tmax:26,tmin:12, wind:3.3,wdir:210, rain:0,  cloud:30, vis:18000, rh:42, blh:1650, cape:780},
    {code:1, tmax:29,tmin:13, wind:8, wdir:190, rain:0,  cloud:20, vis:20000, rh:35, blh:1950, cape:1100},
    {code:3, tmax:21,tmin:11, wind:6.4,wdir:265, rain:25, cloud:65, vis:9000,  rh:68, blh:850,  cape:180},
    {code:61,tmax:17,tmin:9,  wind:8.6,wdir:280, rain:80, cloud:90, vis:4000,  rh:85, blh:400,  cape:30},
    {code:2, tmax:23,tmin:10, wind:2.8,wdir:205, rain:5,  cloud:28, vis:17000, rh:44, blh:1550, cape:620}
  ];
  days=[];
  raw.forEach(function(r,i){
    var date=new Date(today); date.setDate(today.getDate()+i);
    var dow=date.getDay();
    var t12=r.tmax-3, td12=t12-(100-r.rh)/5;
    var th=calcThermal(r.tmax,[r.rh],[r.blh],[r.cape],t12,td12);
    days.push({
      lbl: i===0?'Dnes':i===1?'Zítra':DS[dow],
      full:i===0?'Dnes':i===1?'Zítra':DF[dow],
      code:r.code, tmax:r.tmax, tmin:r.tmin,
      wind:r.wind, wdir:r.wdir, rain:r.rain, cloud:r.cloud,
      vis: Math.round(r.vis/100)/10,
      tb:th.tb, ts:th.ts, tbMax:th.tbMax, wstar:th.wstar, spread:th.spread, cape:th.cape, rh:th.rh,
      cuLabel:th.cuLabel, cuColor:th.cuColor, cuProb:th.cuProb
    });
  });
  sel=0;
  el('upd').textContent='DEMO DATA (API nedostupné)';
  render(); showApp();
}

function start(){el('locname').textContent=locName;loadWeather()}
start();
