<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#f0f4f8">
<title>Půjdu plachtit?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;color:#1a2540;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;background:#f0f4f8;padding:20px}
#errbox{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center;background:#f0f4f8}
#app{display:none;max-width:520px;margin:0 auto;padding-bottom:60px}
.spin{width:40px;height:40px;border:3px solid #dde3ed;border-top-color:#2563eb;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase}
.emsg{font-size:13px;color:#64748b;line-height:1.7;max-width:320px;word-break:break-all}
.btn{padding:11px 24px;border-radius:10px;background:#2563eb;color:#fff;font-weight:700;font-size:13px;border:none;cursor:pointer}
header{padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;background:rgba(255,255,255,.97);backdrop-filter:blur(14px);z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.ttl{font-size:17px;font-weight:800;letter-spacing:1px;color:#1a2540}
.hsub{font-size:8px;color:#94a3b8;letter-spacing:1.5px;margin-top:2px;text-transform:uppercase;line-height:1.4;max-width:160px}
.lbtn{display:flex;align-items:center;gap:5px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:18px;padding:6px 12px;cursor:pointer;font-size:11px;color:#2563eb;font-weight:600;max-width:155px;white-space:nowrap;overflow:hidden}
.lbtn span{overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 0}
.upd{font-size:9px;color:#2a3d56;letter-spacing:1px}
.ref{background:#fff;border:1px solid #e2e8f0;color:#64748b;border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer}
.ref:hover{border-color:#2563eb;color:#2563eb}
.sec{padding:14px 18px 0}
.slbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#94a3b8;margin-bottom:10px}
.strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.strip::-webkit-scrollbar{height:3px}
.strip::-webkit-scrollbar-thumb{background:#dde3ed;border-radius:2px}
.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 9px;min-width:62px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;cursor:pointer;color:inherit;outline:none;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.chip.on{background:#eff6ff;border-color:#93c5fd;box-shadow:0 2px 12px rgba(37,99,235,.12)}
.chip:hover{border-color:#93c5fd}
.cbox{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px 14px 10px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.cbars{display:flex;align-items:flex-end;gap:5px;height:68px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bdays{display:flex;gap:5px;margin-top:4px}
.bd{flex:1;text-align:center;font-size:9px}
.hero{background:#fff;border:1.5px solid #e2e8f0;border-radius:20px;padding:20px;position:relative;overflow:hidden;transition:border-color .3s;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.htop{display:flex;align-items:center;margin-bottom:14px}
.hday{font-size:28px;font-weight:800;color:#1a2540;flex:1;letter-spacing:.5px}
.hvd{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:6px;margin-bottom:18px;width:100%}
.tbig{font-size:32px;font-weight:800;color:#ea6c00;line-height:1}
.tsub{font-size:11px;color:#94a3b8;margin-top:3px}
.thbox{background:linear-gradient(135deg,#f0fdf4,#f0f9ff);border:1.5px solid #86efac;border-radius:13px;padding:14px 13px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.thitem{text-align:center}
.thval{font-size:20px;font-weight:800;line-height:1}
.thlbl{font-size:8px;color:#64748b;letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.gb2{background:#f8fafc;border:1px solid #e2e8f0;border-radius:13px;padding:11px 13px;display:flex;flex-direction:column;box-sizing:border-box}
.gbar-wrap{margin-top:auto;padding-top:6px}
.gl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;margin-bottom:6px}
.gv{font-size:22px;font-weight:800;line-height:1}
.gu{font-size:10px;color:#94a3b8;margin-left:2px}
.gs{font-size:10px;color:#b0bcd0;margin-top:3px}
.bt{background:#e9eff6;border-radius:3px;height:5px;overflow:hidden;margin-top:7px}
.bf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.tbrs{display:flex;gap:3px;align-items:flex-end;margin-top:6px}
.tbr{width:8px;border-radius:3px}
.gval-row{display:flex;align-items:center;gap:5px;margin-top:4px;flex:1}
#ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
#ov.open{display:flex}
#modal{width:100%;max-width:520px;background:#fff;border-top-left-radius:22px;border-top-right-radius:22px;padding:26px 18px 40px;position:relative;animation:slideup .25s ease;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
@keyframes slideup{from{transform:translateY(50px);opacity:0}to{transform:none;opacity:1}}
.mtitle{font-size:17px;font-weight:800;color:#1a2540;margin-bottom:3px}
.msub{font-size:11px;color:#64748b;margin-bottom:16px}
.mrow{display:flex;gap:8px;margin-bottom:12px}
.mi{flex:1;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:11px;padding:11px 14px;color:#1a2540;font-size:14px;outline:none;transition:border-color .2s}
.mi:focus{border-color:#2563eb}
.mi::placeholder{color:#94a3b8}
.mb{background:#2563eb;color:#fff;border:none;border-radius:11px;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.mb:disabled{opacity:.5}
.mrs{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.mr{background:#f8fafc;border:1px solid #e2e8f0;border-radius:11px;padding:11px 14px;cursor:pointer;transition:background .15s}
.mr:hover{background:#eff6ff;border-color:#bfdbfe}
.mrn{font-size:14px;font-weight:600;color:#1a2540}
.mrd{font-size:11px;color:#64748b;margin-top:2px}
.mre{font-size:13px;color:#64748b;text-align:center;padding:18px 0}
.mgps{width:100%;margin-top:10px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:11px;padding:10px;color:#2563eb;font-size:13px;font-weight:600;cursor:pointer}
.mgps:hover{background:#eff6ff}
.mclose{position:absolute;top:15px;right:17px;background:none;border:none;color:#94a3b8;font-size:21px;cursor:pointer;padding:3px;line-height:1}
</style>
</head>
<body>
<div id="loading">
  <div style="margin-bottom:8px">
    <svg width="280" height="110" viewBox="0 0 280 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="140" cy="106" rx="115" ry="4" fill="#cbd5e1" opacity="0.35"/>
      <path d="M22 54 Q38 44 62 43 Q110 40 170 42 Q215 43 245 47 Q260 50 270 54 Q260 58 245 59 Q215 61 170 62 Q110 64 62 63 Q38 63 22 54 Z" fill="#334155"/>
      <path d="M48 54 Q56 34 78 30 Q100 27 122 32 Q138 36 140 54 Z" fill="#60a5fa" opacity="0.5"/>
      <path d="M48 54 Q56 34 78 30 Q100 27 122 32 Q138 36 140 54 Z" fill="none" stroke="#1e40af" stroke-width="1.5"/>
      <line x1="80" y1="28" x2="82" y2="54" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
      <line x1="110" y1="31" x2="112" y2="54" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
      <path d="M108 52 L4 78 L7 82 L112 56 Z" fill="#334155"/>
      <path d="M124 49 L268 28 L267 24 L122 45 Z" fill="#334155"/>
      <path d="M248 54 L256 26 L252 25 L244 54 Z" fill="#334155"/>

      <path d="M252 54 L268 60 L268 63 L251 57 Z" fill="#475569"/>
      <ellipse cx="22" cy="54" rx="8" ry="6" fill="#475569"/>

      <ellipse cx="248" cy="60" rx="3" ry="2.5" fill="#1e293b"/>

  </div>
  <div class="spin"></div>
  <div class="ltxt" id="lmsg">Načítám počasí...</div>
</div>
<div id="errbox">
  <div style="font-size:36px">&#9888;</div>

</div>
<div id="ov" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <button class="mclose" onclick="closeModal()">&#10005;</button>
    <div class="mtitle">Změnit místo</div>

      <input class="mi" id="mi" type="text" placeholder="Brno, Příbram, LKPM..."/>

    <button class="mgps" onclick="useGPS()">&#128205; Použít GPS polohu</button>
  </div>
</div>
<div id="app">
  <header>
    <div class="logo-wrap">
      <svg width="52" height="20" viewBox="0 0 280 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 54 Q38 44 62 43 Q110 40 170 42 Q215 43 245 47 Q260 50 270 54 Q260 58 245 59 Q215 61 170 62 Q110 64 62 63 Q38 63 22 54 Z" fill="#334155"/>
        <path d="M48 54 Q56 34 78 30 Q100 27 122 32 Q138 36 140 54 Z" fill="#3b82f6" opacity="0.6"/>
        <path d="M108 52 L4 78 L7 82 L112 56 Z" fill="#334155"/>
        <path d="M124 49 L268 28 L267 24 L122 45 Z" fill="#334155"/>
        <path d="M248 54 L256 26 L252 25 L244 54 Z" fill="#334155"/>
        <path d="M238 55 L220 63 L221 66 L240 58 Z" fill="#475569"/>
        <path d="M252 54 L268 60 L268 63 L251 57 Z" fill="#475569"/>
        <ellipse cx="22" cy="54" rx="8" ry="6" fill="#475569"/>
      </svg>
      <div>
        <div class="ttl">PŮJDU PLACHTIT?</div>
        <div class="hsub">Rychlá předpověď<br>pro líné plachtaře</div>
      </div>
    </div>
    <div class="lbtn" onclick="openModal()">&#128205; <span id="locname">Soběslav</span></div>
  </header>
  <div class="meta">
    <span class="upd" id="upd"></span>
    <button class="ref" onclick="loadWeather()">&#8635; Obnovit</button>
  </div>
  <div class="sec"><div class="slbl">5-denní předpověď</div><div class="strip" id="strip"></div></div>
  <div class="sec">
    <div class="cbox">
      <div class="slbl" style="margin-bottom:8px">Skóre létání</div>
      <div class="cbars" id="cbars"></div>
      <div class="bdays" id="bdays"></div>
    </div>
  </div>
  <div class="sec"><div class="slbl" id="hlbl">Detail dne</div><div class="hero" id="hero"></div></div>
  <div id="gauges-grid" style="margin-top:9px"></div>
  <div id="footnote-box" style="margin-top:9px;padding-bottom:14px"></div>
</div>
<script>
var days=[],sel=0,lat=49.2489,lon=14.7203,locName='Letiště Soběslav';
var DS=['Ne','Po','Út','St','Čt','Pá','So'],DF=['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
function el(id){return document.getElementById(id)}
function showLoading(m){el('loading').style.display='flex';el('errbox').style.display='none';el('app').style.display='none';if(m)el('lmsg').textContent=m}
function showApp(){el('loading').style.display='none';el('errbox').style.display='none';el('app').style.display='block'}
function showError(m){el('loading').style.display='none';el('errbox').style.display='flex';el('emsg').textContent=m}
function avg(a){var s=0,n=0;for(var i=0;i<a.length;i++){if(a[i]!=null&&!isNaN(a[i])){s+=a[i];n++;}}return n?s/n:0}

function score(d){
  if(d.rain>=40&&d.cloud>=70&&d.vis<5)return 0;
  if(d.rain>=60)return 0;
  if(d.vis<2)return 0;
  if(d.cloud>=90&&d.vis<3)return 0;
  var s=0;
  s+=(d.ts/5)*40;
  if(d.cuProb===3)s+=30;else if(d.cuProb===2)s+=20;else if(d.cuProb===1)s+=10;
  var w=d.wind;
  if(w>10)return 0;
  var wf=w<=5?1.0:1.0-(w-5)/5;
  s+=Math.round(wf*20);
  s+=Math.max(0,5-d.rain*0.06);
  s+=Math.min(d.vis/5,5);
  return Math.max(0,Math.min(100,Math.round(s)));
}
function verd(s){
  if(s>=78)return{l:'Výborné',c:'#00e676',bg:'rgba(0,230,118,.12)'};
  if(s>=60)return{l:'Dobré',c:'#ffd740',bg:'rgba(255,215,64,.10)'};
  if(s>=40)return{l:'Slabé',c:'#ff9100',bg:'rgba(255,145,0,.10)'};
  return{l:'Nelétejte',c:'#ff3d5a',bg:'rgba(255,61,90,.10)'};
}
function wico(c){if(c===0)return'&#9728;';if(c<=2)return'&#127780;';if(c===3)return'&#9729;';if(c<=49)return'&#127787;';if(c<=67)return'&#127783;';if(c<=77)return'&#10052;';if(c<=82)return'&#127782;';return'&#9928;'}
function wdl(d){return['S','SSV','SV','VSV','V','VJV','JV','JJV','J','JJZ','JZ','ZJZ','Z','ZSZ','SZ','SSZ'][Math.round(d/22.5)%16]}
function ring(s,c){var r=33,ci=2*Math.PI*r,d=s/100*ci;return'<div style="position:relative;width:74px;height:74px;flex-shrink:0"><svg width="74" height="74" viewBox="0 0 84 84" style="transform:rotate(-90deg)"><circle cx="42" cy="42" r="'+r+'" fill="none" stroke="#e9eff6" stroke-width="8"/><circle cx="42" cy="42" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="8" stroke-dasharray="'+d+' '+ci+'" stroke-linecap="round" style="filter:drop-shadow(0 0 5px '+c+')"/></svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:21px;font-weight:800;color:'+c+';line-height:1">'+s+'</span><span style="font-size:8px;color:#94a3b8">/100</span></div></div>'}
function arrow(deg){var d=(deg+180)%360;return'<svg width="30" height="30" viewBox="0 0 30 30"><circle cx="15" cy="15" r="13" fill="none" stroke="#e2e8f0" stroke-width="1.5"/><g transform="rotate('+d+',15,15)"><polygon points="15,3 18.5,16 15,13 11.5,16" fill="#2563eb"/></g></svg>'}
function tbars(ts){var h='<div class="tbrs">';for(var i=0;i<5;i++){var lit=i<Math.round(ts),ht=9+i*7;h+='<div class="tbr" style="height:'+ht+'px;background:'+(lit?'#16a34a':'#e9eff6')+';box-shadow:'+(lit?'0 0 6px #16a34a55':'none')+'"></div>'}return h+'</div>'}
function bar(pct,col){return'<div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%;background:linear-gradient(90deg,'+col+'66,'+col+')"></div></div>'}

function calcThermal(tmax,rhArr,blhArr,capeArr,t12,td12,spread12z,maxSpreadDay,sw12){
  var rh=rhArr.length?avg(rhArr):60;
  var sp12=(spread12z>0)?spread12z:((t12!=null&&td12!=null)?Math.max(0,t12-td12):(100-rh)/5);
  var spreadMax=(td12!=null)?Math.max(0,tmax-td12):sp12+(tmax-(t12||tmax));
  var spMax=Math.max(sp12,maxSpreadDay||0,spreadMax);
  var K=120;
  var tb=Math.round(sp12*K);tb=Math.max(100,Math.min(3800,tb));
  var tbMax=Math.round(spMax*K);tbMax=Math.max(tb,Math.min(3800,tbMax));
  var cape=capeArr.length?avg(capeArr):0;
  var blhVal=blhArr.length?avg(blhArr):0;
  var tsSpread=Math.min(spMax/4.0,1.5);
  var tsTemp=tmax>=28?1.5:tmax>=22?1.0:tmax>=16?0.5:0;
  var tsCape=Math.min(cape/500,1.5);
  var tsBlh=(blhVal>500&&blhVal<4000)?Math.min(blhVal/1000,1.5):0;
  var ts=tsSpread+tsTemp+(tsCape>tsBlh?tsCape:tsBlh);
  ts=Math.max(0,Math.min(5,ts));
  var spread=sp12;
  var cuProb,cuLabel,cuColor;
  if(tmax<12||ts<0.5){cuProb=0;cuLabel='Ne';cuColor='#ff3d5a';}
  else if(spread<8&&ts>=1.5){cuProb=3;cuLabel='Ano';cuColor='#00e676';}
  else if(spread<12&&ts>=1.0){cuProb=2;cuLabel='Možná';cuColor='#ffd740';}
  else if(spread>=12){cuProb=1;cuLabel='Modrá termika';cuColor='#5badff';}
  else{cuProb=1;cuLabel='Málo';cuColor='#ff9100';}
  var g_rho=9.81/1200,To_K=(t12!=null?t12:tmax)+273.15;
  var zi=(blhVal>200&&blhVal<4000)?blhVal:tb*0.7;
  var H=0.27*(sw12||0),wstar;
  if(sw12>50&&zi>200){wstar=Math.pow(g_rho*H*zi/To_K,1/3);wstar=Math.round(wstar*10)/10;}
  else if(cape>0){wstar=Math.round(0.4*Math.pow(cape,1/3)*10)/10;}
  else{wstar=Math.round((0.3+0.55*ts)*10)/10;}
  wstar=Math.max(0,Math.min(6,wstar));
  return{tb:tb,ts:ts,tbMax:tbMax,wstar:wstar,spread:Math.round(spread*10)/10,cape:Math.round(cape),rh:Math.round(rh),cuLabel:cuLabel,cuColor:cuColor,cuProb:cuProb};
}

function render(){
  var s2=el('strip');s2.innerHTML='';
  days.forEach(function(d,i){var s=score(d),v=verd(s);var b=document.createElement('button');b.className='chip'+(i===sel?' on':'');b.innerHTML='<span style="font-size:9px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase">'+d.lbl+'</span><span style="font-size:20px">'+wico(d.code)+'</span><span style="font-size:17px;font-weight:800;color:'+v.c+'">'+s+'</span><span style="font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;background:'+v.bg+';color:'+v.c+'">'+v.l+'</span><span style="font-size:10px">'+d.tmax+'&#176;C</span>';b.onclick=function(){sel=i;render()};s2.appendChild(b)});
  var bw=el('cbars'),bd=el('bdays');bw.innerHTML='';bd.innerHTML='';
  days.map(score).forEach(function(s,i){var v=verd(s),h=Math.max(4,Math.round(s/100*64)),a=i===sel;var col=document.createElement('div');col.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer';col.innerHTML='<span style="font-size:9px;font-weight:700;color:'+(a?v.c:v.c+'55')+'">'+s+'</span><div style="width:100%;border-radius:4px 4px 0 0;height:'+h+'px;background:'+(a?'linear-gradient(180deg,'+v.c+','+v.c+'88)':'linear-gradient(180deg,'+v.c+'44,'+v.c+'18)')+'"></div>';col.onclick=function(){sel=i;render()};bw.appendChild(col);var lbl=document.createElement('div');lbl.style.cssText='flex:1;text-align:center;font-size:9px;color:'+(i===sel?'#1a2540':'#94a3b8');lbl.textContent=days[i].lbl;bd.appendChild(lbl)});
  var d=days[sel],s=score(d),v=verd(s);
  var vc=d.vis>=10?'#00e676':d.vis>=5?'#ffd740':'#ff3d5a';
  var wc=d.wind<=5?'#00e676':d.wind<=8?'#ffd740':'#ff3d5a';
  var rc=d.rain<20?'#94a3b8':d.rain<50?'#ffd740':'#ff3d5a';
  var tbc=d.tb>1500?'#16a34a':d.tb>900?'#f59e0b':'#ff9100';
  el('hlbl').textContent='Detail — '+d.full;
  el('hero').style.borderColor=v.c+'44';
  el('hero').innerHTML=
    '<div class="htop"><div class="hday">'+d.full+'</div><span style="font-size:36px">'+wico(d.code)+'</span></div>'
    +'<div class="hvd" style="background:'+v.bg+';color:'+v.c+'">'+v.l+'</div>'
    +'<div class="srow">'
      +ring(s,v.c)
      +'<div style="flex:1;min-width:0;padding-left:6px"><div class="tbig">'+d.tmax+'&#176;C</div><div class="tsub">min '+d.tmin+'&#176;C</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0"><div class="gl">Termika</div>'+tbars(d.ts)+'<div class="gs">'+d.ts.toFixed(1)+'/5</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0"><div class="gl">Stoupání</div><div><span style="font-size:20px;font-weight:800;color:#2563eb;line-height:1.1">'+d.wstar+'</span><span class="gu">m/s</span></div><div class="gs">průměr</div></div>'
    +'</div>'
    +'<div class="thbox">'
      +'<div class="thitem"><div class="thval" style="color:'+tbc+'">'+d.tb+'</div><div class="thlbl">Základna 12Z (m)</div></div>'
      +'<div class="thitem"><div class="thval" style="color:#16a34a">'+(d.tbMax||d.tb)+'</div><div class="thlbl">Max základna (m)</div></div>'
      +'<div class="thitem"><div class="thval" style="color:'+d.cuColor+'">'+d.cuLabel+'</div><div class="thlbl">Cu oblaky</div></div>'
    +'</div>';
  el('gauges-grid').innerHTML=
    '<div style="display:flex;gap:9px;margin-bottom:9px">'
      +'<div class="gb2" style="flex:1"><div class="gl">Vítr</div><div class="gval-row">'+arrow(d.wdir)+'<span class="gv" style="color:'+wc+'">'+d.wind+'</span><span class="gu">m/s</span></div><div class="gs">'+wdl(d.wdir)+'</div><div class="gbar-wrap">'+bar(Math.min(d.wind/12*100,100),wc)+'</div></div>'
      +'<div class="gb2" style="flex:1"><div class="gl">Oblačnost</div><div class="gval-row"><span class="gv" style="color:#f59e0b">'+d.cloud+'</span><span class="gu">%</span></div><div class="gs">Vlhkost: '+d.rh+'%</div><div class="gbar-wrap">'+bar(d.cloud,'#f59e0b')+'</div></div>'
    +'</div>'
    +'<div style="display:flex;gap:9px">'
      +'<div class="gb2" style="flex:1"><div class="gl">Dohlednost</div><div class="gval-row"><span class="gv" style="color:'+vc+'">'+d.vis+'</span><span class="gu">km</span></div><div class="gs">&nbsp;</div><div class="gbar-wrap">'+bar(Math.min(d.vis/25*100,100),vc)+'</div></div>'
      +'<div class="gb2" style="flex:1"><div class="gl">Srážky</div><div class="gval-row"><span class="gv" style="color:'+rc+'">'+d.rain+'</span><span class="gu">%</span></div><div class="gs">&nbsp;</div><div class="gbar-wrap">'+bar(d.rain,'#ff3d5a')+'</div></div>'
    +'</div>';
  var _now=new Date();
  var _ft=_now.getUTCHours().toString().padStart(2,'0')+':'+_now.getUTCMinutes().toString().padStart(2,'0')+' UTC';
  var _fd=_now.getUTCFullYear()+'-'+(_now.getUTCMonth()+1).toString().padStart(2,'0')+'-'+_now.getUTCDate().toString().padStart(2,'0');
  el('footnote-box').innerHTML=
    '<div style="padding:9px 12px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;font-size:10px;color:#0369a1;line-height:1.8">'
      +'<b>Hodnoty platí pro 12:00 UTC (14:00 SELČ)</b><br>'
      +'<b>Čas stažení:</b> '+_fd+' '+_ft+'<br>'
      +'<b>Zdroj:</b> Open-Meteo best_match &mdash; DWD ICON-EU / ECMWF IFS / NOAA GFS<br>'
      +'Základna Cu: LCL=(T&minus;Td)&times;120m &nbsp;|&nbsp; W*=Deardorff (1970)'
    +'</div>';
}

function loadWeather(){
  showLoading('Načítám počasí...');
  var url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
    +'&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max,wind_direction_10m_dominant,precipitation_probability_max,precipitation_sum,cloud_cover_mean'
    +'&hourly=relative_humidity_2m,dew_point_2m,temperature_2m,boundary_layer_height,cape,visibility,precipitation_probability,shortwave_radiation'
    +'&wind_speed_unit=kmh&timezone=UTC&forecast_days=5';
  fetch(url)
    .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(r.status+': '+t.slice(0,100))});return r.json()})
    .then(function(data){
      var dl=data.daily,hl=data.hourly,n=dl.time.length;
      days=[];
      for(var i=0;i<n;i++){
        var h0=i*24,target12=dl.time[i]+'T12:00',h12=h0+12;
        if(hl.time){for(var hi=h0;hi<h0+24&&hi<hl.time.length;hi++){if(hl.time[hi]&&hl.time[hi].indexOf(target12)===0){h12=hi;break;}}}
        var maxSpreadDay=0,spread12z=0;
        for(var hh=h0+6;hh<h0+21&&hh<(hl.temperature_2m||[]).length;hh++){
          var tH=hl.temperature_2m&&hl.temperature_2m[hh],tdH=hl.dew_point_2m&&hl.dew_point_2m[hh];
          if(tH!=null&&tdH!=null){var spH=tH-tdH;if(spH>maxSpreadDay)maxSpreadDay=spH;if(hh===h12)spread12z=Math.max(0,spH);}
        }
        var rhArr=[],blhArr=[],capeArr=[],visArr=[],t12=null,td12=null;
        if(hl.temperature_2m&&hl.temperature_2m[h12]!=null)t12=hl.temperature_2m[h12];
        if(hl.dew_point_2m&&hl.dew_point_2m[h12]!=null)td12=hl.dew_point_2m[h12];
        if(hl.boundary_layer_height&&hl.boundary_layer_height[h12]!=null)blhArr.push(hl.boundary_layer_height[h12]);
        if(hl.cape&&hl.cape[h12]!=null)capeArr.push(hl.cape[h12]);
        if(hl.relative_humidity_2m&&hl.relative_humidity_2m[h12]!=null)rhArr.push(hl.relative_humidity_2m[h12]);
        if(hl.visibility&&hl.visibility[h12]!=null)visArr.push(hl.visibility[h12]);
        var sw12=(hl.shortwave_radiation&&hl.shortwave_radiation[h12]!=null)?hl.shortwave_radiation[h12]:0;
        var tmax=dl.temperature_2m_max[i]||15;
        var th=calcThermal(tmax,rhArr,blhArr,capeArr,t12,td12,spread12z,maxSpreadDay,sw12);
        var date=new Date(dl.time[i]+'T12:00:00'),dow=date.getDay();
        days.push({lbl:i===0?'Dnes':i===1?'Zítra':DS[dow],full:i===0?'Dnes':i===1?'Zítra':DF[dow],code:dl.weather_code[i]||0,tmax:Math.round(tmax),tmin:Math.round(dl.temperature_2m_min[i]||5),wind:Math.round((dl.wind_speed_10m_max[i]||0)/3.6*10)/10,wdir:Math.round(dl.wind_direction_10m_dominant[i]||0),rain:(function(){var hp=hl.precipitation_probability&&hl.precipitation_probability[h12];var dp=dl.precipitation_probability_max&&dl.precipitation_probability_max[i];var val=Math.max(hp||0,dp||0);var ps=dl.precipitation_sum&&dl.precipitation_sum[i]||0;if(ps>0.5&&val<30)val=Math.max(val,30);if(ps>2&&val<50)val=Math.max(val,50);return Math.round(val)})(),cloud:Math.round(dl.cloud_cover_mean[i]||50),vis:visArr.length?Math.round(avg(visArr)/100)/10:15,tb:th.tb,ts:th.ts,tbMax:th.tbMax,wstar:th.wstar,spread:th.spread,cape:th.cape,rh:th.rh,cuLabel:th.cuLabel,cuColor:th.cuColor,cuProb:th.cuProb});
      }
      sel=0;
      var now=new Date();
      el('upd').textContent='Aktualizováno: '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
      render();showApp();
    })
    .catch(function(e){console.warn('API:',e.message);loadDemoData()});
}

function loadDemoData(){
  var today=new Date();
  var raw=[{code:0,tmax:26,tmin:12,wind:3.3,wdir:210,rain:0,cloud:30,vis:18,rh:42,blh:1650,cape:780,sw:680},{code:1,tmax:29,tmin:13,wind:2.2,wdir:190,rain:0,cloud:18,vis:20,rh:35,blh:1950,cape:1100,sw:750},{code:3,tmax:21,tmin:11,wind:6.4,wdir:265,rain:25,cloud:65,vis:9,rh:68,blh:850,cape:180,sw:320},{code:61,tmax:17,tmin:9,wind:8.6,wdir:280,rain:80,cloud:90,vis:4,rh:85,blh:400,cape:30,sw:80},{code:2,tmax:23,tmin:10,wind:2.8,wdir:205,rain:5,cloud:28,vis:17,rh:44,blh:1550,cape:620,sw:640}];
  days=[];
  raw.forEach(function(r,i){var date=new Date(today);date.setDate(today.getDate()+i);var dow=date.getDay();var t12=r.tmax-3,td12=t12-(100-r.rh)/5,sp12=Math.max(0,t12-td12),spMax=Math.max(0,r.tmax-td12);var th=calcThermal(r.tmax,[r.rh],[r.blh],[r.cape],t12,td12,sp12,spMax,r.sw);days.push({lbl:i===0?'Dnes':i===1?'Zítra':DS[dow],full:i===0?'Dnes':i===1?'Zítra':DF[dow],code:r.code,tmax:r.tmax,tmin:r.tmin,wind:r.wind,wdir:r.wdir,rain:r.rain,cloud:r.cloud,vis:r.vis,tb:th.tb,ts:th.ts,tbMax:th.tbMax,wstar:th.wstar,spread:th.spread,cape:th.cape,rh:th.rh,cuLabel:th.cuLabel,cuColor:th.cuColor,cuProb:th.cuProb})});
  sel=0;el('upd').textContent='DEMO DATA (API nedostupné)';render();showApp();
}

function openModal(){el('ov').classList.add('open');el('mrs').innerHTML='';el('mi').value='';setTimeout(function(){el('mi').focus()},200)}
function closeModal(){el('ov').classList.remove('open')}
el('mi').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});
function doSearch(){
  var q=el('mi').value.trim();if(!q)return;
  var btn=el('mbtn'),res=el('mrs');btn.disabled=true;btn.textContent='...';res.innerHTML='<div class="mre">Hledám...</div>';
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=7&accept-language=cs')
    .then(function(r){return r.json()})
    .then(function(data){if(!data.length){res.innerHTML='<div class="mre">Žádné výsledky.</div>';return}res.innerHTML='';data.forEach(function(item){var parts=item.display_name.split(',');var div=document.createElement('div');div.className='mr';div.innerHTML='<div class="mrn">'+parts[0].trim()+'</div><div class="mrd">'+parts.slice(1,3).join(',').trim()+'</div>';div.onclick=function(){closeModal();lat=parseFloat(item.lat);lon=parseFloat(item.lon);locName=parts[0].trim();el('locname').textContent=locName;loadWeather()};res.appendChild(div)})})
    .catch(function(){res.innerHTML='<div class="mre">Chyba připojení.</div>'})
    .finally(function(){btn.disabled=false;btn.textContent='Hledat'});
}
function useGPS(){
  closeModal();showLoading('GPS...');
  if(!navigator.geolocation){loadWeather();return}
  navigator.geolocation.getCurrentPosition(function(pos){lat=pos.coords.latitude;lon=pos.coords.longitude;fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=cs').then(function(r){return r.json()}).then(function(d){var a=d.address;locName=a.city||a.town||a.village||a.municipality||'GPS';el('locname').textContent=locName}).catch(function(){}).finally(function(){loadWeather()})},function(){loadWeather()},{timeout:7000});
}
function start(){el('locname').textContent=locName;loadWeather()}
start();
</script>
