<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#050c18">
<title>Pujde plachtit?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050c18;color:#c8daf0;font-family:system-ui,sans-serif;min-height:100vh}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;background:#050c18}
#errbox{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center;background:#050c18}
#app{display:none;max-width:520px;margin:0 auto;padding-bottom:60px}
.spin{width:40px;height:40px;border:3px solid #0f1e35;border-top-color:#5badff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:11px;color:#4a6180;letter-spacing:2px}
.emsg{font-size:13px;color:#4a6180;line-height:1.7;max-width:320px;word-break:break-all}
.btn{padding:11px 24px;border-radius:10px;background:#5badff;color:#050c18;font-weight:700;font-size:13px;border:none;cursor:pointer}
header{padding:22px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(120,180,255,.08);position:sticky;top:0;background:rgba(5,12,24,.97);backdrop-filter:blur(14px);z-index:10}
.ttl{font-size:18px;font-weight:800;letter-spacing:2px;color:#e8f4ff}
.hsub{font-size:9px;color:#4a6180;letter-spacing:3px;margin-top:2px}
.lbtn{display:flex;align-items:center;gap:5px;background:rgba(91,173,255,.08);border:1px solid rgba(91,173,255,.2);border-radius:18px;padding:6px 12px;cursor:pointer;font-size:11px;color:#5badff;font-weight:600;max-width:155px;white-space:nowrap;overflow:hidden}
.lbtn span{overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 0}
.upd{font-size:9px;color:#2a3d56;letter-spacing:1px}
.ref{background:none;border:1px solid rgba(120,180,255,.1);color:#4a6180;border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer}
.ref:hover{border-color:#5badff;color:#5badff}
.sec{padding:14px 18px 0}
.slbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#4a6180;margin-bottom:10px}
.strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.strip::-webkit-scrollbar{height:3px}
.strip::-webkit-scrollbar-thumb{background:#1a2d45;border-radius:2px}
.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 9px;min-width:62px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;cursor:pointer;color:inherit;outline:none;transition:all .18s}
.chip.on{background:rgba(91,173,255,.1);border-color:rgba(91,173,255,.32);box-shadow:0 0 16px rgba(91,173,255,.1)}
.chip:hover{background:rgba(91,173,255,.07)}
.cl{font-size:9px;color:#4a6180;letter-spacing:1px;text-transform:uppercase}
.ci{font-size:20px}
.cs{font-size:17px;font-weight:800;line-height:1}
.ct{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px}
.cx{font-size:10px;color:#c8daf0}
.cbox{background:linear-gradient(135deg,#0d1e38,#091526);border:1px solid rgba(120,180,255,.07);border-radius:16px;padding:16px 14px 10px}
.cbars{display:flex;align-items:flex-end;gap:5px;height:68px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.bv{font-size:9px;font-weight:700}
.bb{width:100%;border-radius:4px 4px 0 0;transition:all .3s}
.bdays{display:flex;gap:5px;margin-top:4px}
.bd{flex:1;text-align:center;font-size:9px}
.hero{background:linear-gradient(140deg,#0d1e38,#091526);border:1px solid rgba(120,180,255,.1);border-radius:20px;padding:20px;position:relative;overflow:hidden;transition:border-color .3s}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 85% 20%,rgba(91,173,255,.05),transparent);pointer-events:none}
.htop{display:flex;align-items:center;margin-bottom:14px}
.hday{font-size:30px;font-weight:800;color:#e8f4ff;flex:1;letter-spacing:1px}
.hico{font-size:38px}
.hvd{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.tbig{font-size:42px;font-weight:800;color:#ff9100;line-height:1}
.tsub{font-size:11px;color:#4a6180;margin-top:3px}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.gb{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.05);border-radius:13px;padding:11px 13px}
.gl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a6180;margin-bottom:6px}
.gv{font-size:23px;font-weight:800;line-height:1}
.gu{font-size:10px;color:#4a6180;margin-left:2px}
.gs{font-size:10px;color:#2a3d56;margin-top:3px}
.bt{background:#070e1a;border-radius:3px;height:5px;overflow:hidden;margin-top:7px}
.bf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.tbrs{display:flex;gap:3px;align-items:flex-end;margin-top:6px}
.tbr{width:8px;border-radius:3px}
.wrow{display:flex;align-items:center;gap:10px;margin-top:5px}
.thbox{grid-column:span 2;background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.15);border-radius:13px;padding:11px 13px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.thitem{text-align:center}
.thval{font-size:20px;font-weight:800;line-height:1}
.thlbl{font-size:8px;color:#4a6180;letter-spacing:1px;margin-top:3px;text-transform:uppercase}
#ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,12,24,.9);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
#ov.open{display:flex}
#modal{width:100%;max-width:520px;background:#0d1e38;border:1px solid rgba(91,173,255,.2);border-top-left-radius:22px;border-top-right-radius:22px;padding:26px 18px 40px;position:relative;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(50px);opacity:0}to{transform:none;opacity:1}}
.mtitle{font-size:17px;font-weight:800;color:#e8f4ff;margin-bottom:3px}
.msub{font-size:11px;color:#4a6180;margin-bottom:16px}
.mrow{display:flex;gap:8px;margin-bottom:12px}
.mi{flex:1;background:#091526;border:1px solid rgba(91,173,255,.2);border-radius:11px;padding:11px 14px;color:#c8daf0;font-size:14px;outline:none;transition:border-color .2s}
.mi:focus{border-color:#5badff}
.mi::placeholder{color:#4a6180}
.mb{background:#5badff;color:#050c18;border:none;border-radius:11px;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.mb:disabled{opacity:.5}
.mrs{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.mr{background:rgba(91,173,255,.05);border:1px solid rgba(91,173,255,.1);border-radius:11px;padding:11px 14px;cursor:pointer;transition:background .15s}
.mr:hover{background:rgba(91,173,255,.13)}
.mrn{font-size:14px;font-weight:600;color:#e8f4ff}
.mrd{font-size:11px;color:#4a6180;margin-top:2px}
.mre{font-size:13px;color:#4a6180;text-align:center;padding:18px 0}
.mgps{width:100%;margin-top:10px;background:none;border:1px solid rgba(91,173,255,.16);border-radius:11px;padding:10px;color:#5badff;font-size:13px;font-weight:600;cursor:pointer}
.mgps:hover{background:rgba(91,173,255,.08)}
.mclose{position:absolute;top:15px;right:17px;background:none;border:none;color:#4a6180;font-size:21px;cursor:pointer;padding:3px;line-height:1}
</style>
</head>
<body>
<div id="loading">
  <div style="font-size:34px">&#9992;</div>
  <div class="spin"></div>
  <div class="ltxt" id="lmsg">Nactavam pocasi...</div>
</div>
<div id="errbox">
  <div style="font-size:36px">&#9888;</div>
  <div class="emsg" id="emsg">Chyba</div>
  <button class="btn" onclick="start()">Zkusit znovu</button>
</div>
<div id="ov" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <button class="mclose" onclick="closeModal()">&#10005;</button>
    <div class="mtitle">Zmenit misto</div>
    <div class="msub">Zadej mesto nebo letiste</div>
    <div class="mrow">
      <input class="mi" id="mi" type="text" placeholder="Brno, Pribram, LKPM..."/>
      <button class="mb" id="mbtn" onclick="doSearch()">Hledat</button>
    </div>
    <div class="mrs" id="mrs"></div>
    <button class="mgps" onclick="useGPS()">&#128205; Pouzit GPS polohu</button>
  </div>
</div>
<div id="app">
  <header>
    <div>
      <div class="ttl">&#9992; PUJDE PLACHTIT?</div>
      <div class="hsub">POCASI PRO VETRONE</div>
    </div>
    <div class="lbtn" onclick="openModal()">&#128205; <span id="locname">Sobeslav</span></div>
  </header>
  <div class="meta">
    <span class="upd" id="upd"></span>
    <button class="ref" onclick="loadWeather()">&#8635; Obnovit</button>
  </div>
  <div class="sec">
    <div class="slbl">5-denni predpoved</div>
    <div class="strip" id="strip"></div>
  </div>
  <div class="sec">
    <div class="cbox">
      <div class="slbl" style="margin-bottom:8px">Skore letani</div>
      <div class="cbars" id="cbars"></div>
      <div class="bdays" id="bdays"></div>
    </div>
  </div>
  <div class="sec">
    <div class="slbl" id="hlbl">Detail dne</div>
    <div class="hero" id="hero"></div>
  </div>
</div>
<script>
var days=[], sel=0;
var lat=49.2489, lon=14.7203, locName='Letiste Sobeslav';
var DS=['Ne','Po','Ut','St','Ct','Pa','So'];
var DF=['Nedele','Pondeli','Utery','Streda','Ctvrtek','Patek','Sobota'];
function el(id){return document.getElementById(id)}
function showLoading(m){el('loading').style.display='flex';el('errbox').style.display='none';el('app').style.display='none';if(m)el('lmsg').textContent=m}
function showApp(){el('loading').style.display='none';el('errbox').style.display='none';el('app').style.display='block'}
function showError(m){el('loading').style.display='none';el('errbox').style.display='flex';el('emsg').textContent=m}
function avg(a){var s=0,n=0;for(var i=0;i<a.length;i++){if(a[i]!=null&&!isNaN(a[i])){s+=a[i];n++;}}return n?s/n:0}

/* THERMAL CALCULATION - fyzikalne spravna metoda pro vetronare
   Zakladna termiky (m) = (T_surface - T_rosny_bod) * 122
   T_rosny_bod se odhaduje z relativni vlhkosti: Td = T - (100-RH)/5
   Spread = T - Td = (100 - RH) / 5
   Zakladna = spread * 122                                          */
function calcThermal(tmax, rhArr, blhArr, capeArr, t12, td12) {
  var rh = rhArr.length ? avg(rhArr) : 60;

  // Spread T-Td: pouzij primo rosny bod pokud je k dispozici, jinak odhadni z RH
  var spread;
  if(t12!=null && td12!=null) {
    spread = t12 - td12;  // presny spread z rosneho bodu
  } else {
    spread = (100 - rh) / 5;  // odhad z relativni vlhkosti
  }
  spread = Math.max(0, spread);

  // Zakladna Cu (LCL): standardni vzorec pouzivany vetronari
  // LCL (m) = spread (degC) * 122
  var tbBySpread = Math.round(spread * 122);

  // Pouzij boundary layer height pokud je k dispozici a rozumna
  var blhVal = blhArr.length ? avg(blhArr) : 0;
  var tbByBlh = (blhVal > 200 && blhVal < 5000) ? Math.round(blhVal) : 0;

  var tb = tbByBlh > 300 ? tbByBlh : tbBySpread;
  tb = Math.max(150, Math.min(3500, tb));

  // Sila termiky 0-5
  var cape = capeArr.length ? avg(capeArr) : 0;
  var tsSpread = Math.min(spread / 3.5, 1.5);
  var tsTemp   = tmax >= 28 ? 1.5 : tmax >= 22 ? 1.0 : tmax >= 16 ? 0.5 : 0;
  var tsCape   = Math.min(cape / 600, 1.5);
  var tsBlh    = tbByBlh > 300 ? Math.min(tbByBlh / 800, 1.5) : 0;
  var ts = tsSpread + tsTemp + (tsBlh > 0 ? tsBlh : tsCape);
  ts = Math.max(0, Math.min(5, ts));

  // Predikce Cu oblaku
  // Cu vznikaji kdyz: termika dosahne LCL (zakladnu) a je dostatek vlhkosti
  // spread < 8°C  -> vlhky vzduch -> Cu velmi pravdepodobne
  // spread 8-15°C -> mirne vlhky -> Cu mozna
  // spread > 15°C -> suchy vzduch -> modra termika (bez oblaku)
  // Teplota musi byt > 12°C a termika aktivni
  var cuProb, cuLabel, cuColor;
  if(tmax < 12 || ts < 0.5) {
    cuProb = 0; cuLabel = 'Ne'; cuColor = '#ff3d5a';
  } else if(spread < 8 && ts >= 1.5) {
    cuProb = 3; cuLabel = 'Ano'; cuColor = '#00e676';
  } else if(spread < 12 && ts >= 1.0) {
    cuProb = 2; cuLabel = 'Mozna'; cuColor = '#ffd740';
  } else if(spread >= 12) {
    cuProb = 1; cuLabel = 'Modra termika'; cuColor = '#5badff';
  } else {
    cuProb = 1; cuLabel = 'Malo'; cuColor = '#ff9100';
  }

  return {
    tb: tb, ts: ts,
    spread: Math.round(spread*10)/10,
    cape: Math.round(cape), rh: Math.round(rh),
    cuLabel: cuLabel, cuColor: cuColor, cuProb: cuProb
  };
}

function score(d){
  var s=50;
  if(d.tb>1800)s+=22; else if(d.tb>1400)s+=16; else if(d.tb>900)s+=8; else if(d.tb>500)s+=3; else s-=12;
  s+=Math.min(d.ts*7,22);
  if(d.wind<5)s-=8; else if(d.wind<=15)s+=12; else if(d.wind<=25)s+=6; else if(d.wind<=35)s-=8; else s-=22;
  if(d.cloud>=20&&d.cloud<=60)s+=8; else if(d.cloud>80)s-=14; else if(d.cloud<5)s-=4;
  s+=Math.min(d.vis/2,12);
  s-=d.rain*0.55;
  if(d.tmax>=20&&d.tmax<=34)s+=8; else if(d.tmax>=15)s+=3; else if(d.tmax<10)s-=16;
  return Math.max(0,Math.min(100,Math.round(s)));
}
function verd(s){
  if(s>=78)return{l:'Vyborne',  c:'#00e676',bg:'rgba(0,230,118,.12)'};
  if(s>=60)return{l:'Dobre',    c:'#ffd740',bg:'rgba(255,215,64,.10)'};
  if(s>=40)return{l:'Slabe',    c:'#ff9100',bg:'rgba(255,145,0,.10)'};
  return          {l:'Neletejte',c:'#ff3d5a',bg:'rgba(255,61,90,.10)'};
}
function wico(c){
  if(c===0)return'&#9728;';if(c<=2)return'&#127780;';if(c===3)return'&#9729;';
  if(c<=49)return'&#127787;';if(c<=67)return'&#127783;';if(c<=77)return'&#10052;';
  if(c<=82)return'&#127782;';return'&#9928;';
}
function wdl(d){return['S','SSV','SV','VSV','V','VJV','JV','JJV','J','JJZ','JZ','ZJZ','Z','ZSZ','SZ','SSZ'][Math.round(d/22.5)%16]}
function ring(s,c){
  var r=33,ci=2*Math.PI*r,d=s/100*ci;
  return '<div style="position:relative;width:84px;height:84px;flex-shrink:0">'
    +'<svg width="84" height="84" viewBox="0 0 84 84" style="transform:rotate(-90deg)">'
    +'<circle cx="42" cy="42" r="'+r+'" fill="none" stroke="#0a1525" stroke-width="8"/>'
    +'<circle cx="42" cy="42" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="8" stroke-dasharray="'+d+' '+ci+'" stroke-linecap="round" style="filter:drop-shadow(0 0 6px '+c+')"/>'
    +'</svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
    +'<span style="font-size:21px;font-weight:800;color:'+c+';line-height:1">'+s+'</span>'
    +'<span style="font-size:8px;color:#4a6180">/100</span></div></div>';
}
function arrow(deg){
  return '<svg width="30" height="30" viewBox="0 0 30 30">'
    +'<circle cx="15" cy="15" r="13" fill="none" stroke="#1a2d45" stroke-width="1.5"/>'
    +'<g transform="rotate('+deg+',15,15)"><polygon points="15,3 18.5,16 15,13 11.5,16" fill="#5badff" style="filter:drop-shadow(0 0 3px #5badff)"/></g></svg>';
}
function tbars(ts){
  var h='<div class="tbrs">';
  for(var i=0;i<5;i++){
    var lit=i<Math.round(ts),ht=9+i*7;
    h+='<div class="tbr" style="height:'+ht+'px;background:'+(lit?'#00e676':'#0a1525')+';box-shadow:'+(lit?'0 0 6px #00e67655':'none')+'"></div>';
  }
  return h+'</div>';
}
function bar(pct,col){
  return '<div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%;background:linear-gradient(90deg,'+col+'66,'+col+')"></div></div>';
}

function render(){
  // Strip
  var s2=el('strip'); s2.innerHTML='';
  days.forEach(function(d,i){
    var s=score(d),v=verd(s);
    var b=document.createElement('button');
    b.className='chip'+(i===sel?' on':'');
    b.innerHTML='<span class="cl">'+d.lbl+'</span>'
      +'<span class="ci">'+wico(d.code)+'</span>'
      +'<span class="cs" style="color:'+v.c+'">'+s+'</span>'
      +'<span class="ct" style="background:'+v.bg+';color:'+v.c+'">'+v.l+'</span>'
      +'<span class="cx">'+d.tmax+'&#176;C</span>';
    b.onclick=function(){sel=i;render();};
    s2.appendChild(b);
  });
  // Chart
  var bw=el('cbars'),bd=el('bdays'); bw.innerHTML=''; bd.innerHTML='';
  days.map(score).forEach(function(s,i){
    var v=verd(s),h=Math.max(4,Math.round(s/100*64)),a=i===sel;
    var col=document.createElement('div'); col.className='bc';
    col.innerHTML='<span class="bv" style="color:'+(a?v.c:v.c+'55')+'">'+s+'</span>'
      +'<div class="bb" style="height:'+h+'px;background:'+(a?'linear-gradient(180deg,'+v.c+','+v.c+'88)':'linear-gradient(180deg,'+v.c+'44,'+v.c+'18)')+';'+(a?'box-shadow:0 0 12px '+v.c+'44':'')+'"></div>';
    col.onclick=function(){sel=i;render();};
    bw.appendChild(col);
    var lbl=document.createElement('div'); lbl.className='bd';
    lbl.style.color=i===sel?'#c8daf0':'#4a6180';
    lbl.textContent=days[i].lbl; bd.appendChild(lbl);
  });
  // Hero
  var d=days[sel], s=score(d), v=verd(s);
  var vc=d.vis>=10?'#00e676':d.vis>=5?'#ffd740':'#ff3d5a';
  var wc=d.wind<=20?'#00e676':d.wind<=30?'#ffd740':'#ff3d5a';
  var rc=d.rain<20?'#4a6180':d.rain<50?'#ffd740':'#ff3d5a';
  var tbc=d.tb>1500?'#00e676':d.tb>900?'#ffd740':'#ff9100';
  el('hlbl').textContent='Detail - '+d.full;
  el('hero').style.borderColor=v.c+'44';
  el('hero').innerHTML=
    '<div class="htop"><div class="hday">'+d.full+'</div><span style="font-size:38px">'+wico(d.code)+'</span></div>'
    +'<div class="hvd" style="background:'+v.bg+';color:'+v.c+'">'+v.l+'</div>'
    +'<div class="srow">'+ring(s,v.c)
      +'<div><div class="tbig">'+d.tmax+'&#176;C</div><div class="tsub">min '+d.tmin+'&#176;C</div></div></div>'
    +'<div class="gg">'
    // Thermal summary box (full width)
    +'<div class="thbox">'
      +'<div class="thitem">'
        +'<div class="thval" style="color:'+tbc+'">'+d.tb+'</div>'
        +'<div class="thlbl">Zakladna Cu (m)</div>'
      +'</div>'
      +'<div class="thitem" style="display:flex;flex-direction:column;align-items:center">'
        +tbars(d.ts)
        +'<div class="thlbl" style="margin-top:5px">Sila termiky</div>'
      +'</div>'
      +'<div class="thitem">'
        +'<div class="thval" style="color:'+d.cuColor+'">'+d.cuLabel+'</div>'
        +'<div class="thlbl">Cu oblaky</div>'
      +'</div>'
    +'</div>'
    +'<div style="margin-top:9px;padding:9px 13px;background:rgba(0,0,0,.2);border-radius:10px;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:10px;color:#4a6180">T&#8722;Td spread: <b style="color:#c8daf0">'+d.spread+'&#176;C</b></span>'
      +'<span style="font-size:10px;color:#4a6180">Vlhkost 12Z: <b style="color:#c8daf0">'+d.rh+'%</b></span>'
      +'<span style="font-size:10px;color:#4a6180">CAPE: <b style="color:#c8daf0">'+d.cape+' J/kg</b></span>'
    +'</div>'
    // Wind
    +'<div class="gb"><div class="gl">Vitr</div>'
      +'<div class="wrow">'+arrow(d.wdir)
        +'<div><span class="gv" style="color:'+wc+'">'+d.wind+'</span><span class="gu">km/h</span>'
        +'<div class="gs">'+wdl(d.wdir)+'</div></div></div>'
      +bar(Math.min(d.wind/60*100,100),wc)+'</div>'
    // Cloud
    +'<div class="gb"><div class="gl">Oblacnost</div>'
      +'<div><span class="gv" style="color:#ffd740">'+d.cloud+'</span><span class="gu">%</span></div>'
      +bar(d.cloud,'#ffd740')
      +'<div class="gs" style="margin-top:4px">Vlhkost: '+d.rh+'%</div>'
    +'</div>'
    // Visibility
    +'<div class="gb"><div class="gl">Dohlednost</div>'
      +'<div><span class="gv" style="color:'+vc+'">'+d.vis+'</span><span class="gu">km</span></div>'
      +bar(Math.min(d.vis/25*100,100),vc)+'</div>'
    // Rain
    +'<div class="gb"><div class="gl">Srazky</div>'
      +'<div><span class="gv" style="color:'+rc+'">'+d.rain+'</span><span class="gu">%</span></div>'
      +bar(d.rain,'#ff3d5a')+'</div>'
    +'</div>';
}

/* API - pouzivame icon_eu (DWD) pro nejlepsi pokryti stredni Evropy */
function loadWeather(){
  showLoading('Nactavam pocasi...');
  var url='https://api.open-meteo.com/v1/forecast'
    +'?latitude='+lat+'&longitude='+lon
    +'&daily=weather_code,temperature_2m_max,temperature_2m_min'
    +',wind_speed_10m_max,wind_direction_10m_dominant'
    +',precipitation_probability_max,cloud_cover_mean'
    +'&hourly=relative_humidity_2m,dew_point_2m,temperature_2m,boundary_layer_height,cape,visibility'
    +'&wind_speed_unit=kmh&timezone=UTC&forecast_days=5'
    +'&models=icon_eu';

  fetch(url)
    .then(function(r){
      if(!r.ok) return r.text().then(function(t){throw new Error(r.status+': '+t.slice(0,200));});
      return r.json();
    })
    .then(function(data){
      var dl=data.daily, hl=data.hourly, n=dl.time.length;
      days=[];
      for(var i=0;i<n;i++){
        var h0=i*24;
        // Hodnoty pro 12:00 UTC
        var h12=h0+12;
        var rhArr=[], blhArr=[], capeArr=[], visArr=[];
        var t12=null, td12=null;
        if(hl.relative_humidity_2m&&hl.relative_humidity_2m[h12]!=null) rhArr.push(hl.relative_humidity_2m[h12]);
        if(hl.boundary_layer_height&&hl.boundary_layer_height[h12]!=null) blhArr.push(hl.boundary_layer_height[h12]);
        if(hl.cape&&hl.cape[h12]!=null) capeArr.push(hl.cape[h12]);
        if(hl.visibility&&hl.visibility[h12]!=null) visArr.push(hl.visibility[h12]);
        if(hl.temperature_2m&&hl.temperature_2m[h12]!=null) t12=hl.temperature_2m[h12];
        if(hl.dew_point_2m&&hl.dew_point_2m[h12]!=null) td12=hl.dew_point_2m[h12];
        var tmax=dl.temperature_2m_max[i]||15;
        var th=calcThermal(tmax, rhArr, blhArr, capeArr, t12, td12);
        var date=new Date(dl.time[i]+'T12:00:00');
        var dow=date.getDay();
        days.push({
          lbl:  i===0?'Dnes':i===1?'Zitra':DS[dow],
          full: i===0?'Dnes':i===1?'Zitra':DF[dow],
          code: dl.weather_code[i]||0,
          tmax: Math.round(tmax),
          tmin: Math.round(dl.temperature_2m_min[i]||5),
          wind: Math.round(dl.wind_speed_10m_max[i]||0),
          wdir: Math.round(dl.wind_direction_10m_dominant[i]||0),
          rain: dl.precipitation_probability_max[i]||0,
          cloud:Math.round(dl.cloud_cover_mean[i]||50),
          vis:  visArr.length?Math.round(avg(visArr)/100)/10:15,
          tb:   th.tb, ts:th.ts, spread:th.spread, cape:th.cape, rh:th.rh
        });
      }
      sel=0;
      var now=new Date();
      el('upd').textContent='Aktualizovano: '
        +now.getHours().toString().padStart(2,'0')+':'
        +now.getMinutes().toString().padStart(2,'0');
      render(); showApp();
    })
    .catch(function(e){ showError('Chyba API: '+e.message); });
}

/* MODAL */
function openModal(){el('ov').classList.add('open');el('mrs').innerHTML='';el('mi').value='';setTimeout(function(){el('mi').focus();},200)}
function closeModal(){el('ov').classList.remove('open')}
el('mi').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});
function doSearch(){
  var q=el('mi').value.trim(); if(!q)return;
  var btn=el('mbtn'),res=el('mrs');
  btn.disabled=true; btn.textContent='...';
  res.innerHTML='<div class="mre">Hledam...</div>';
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=7&accept-language=cs')
    .then(function(r){return r.json()})
    .then(function(data){
      if(!data.length){res.innerHTML='<div class="mre">Zadne vysledky.</div>';return}
      res.innerHTML='';
      data.forEach(function(item){
        var parts=item.display_name.split(',');
        var div=document.createElement('div'); div.className='mr';
        div.innerHTML='<div class="mrn">'+parts[0].trim()+'</div><div class="mrd">'+parts.slice(1,3).join(',').trim()+'</div>';
        div.onclick=function(){closeModal();lat=parseFloat(item.lat);lon=parseFloat(item.lon);locName=parts[0].trim();el('locname').textContent=locName;loadWeather()};
        res.appendChild(div);
      });
    })
    .catch(function(){res.innerHTML='<div class="mre">Chyba pripojeni.</div>'})
    .finally(function(){btn.disabled=false;btn.textContent='Hledat'});
}
function useGPS(){
  closeModal(); showLoading('Zjistuji GPS...');
  if(!navigator.geolocation){loadWeather();return}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      lat=pos.coords.latitude; lon=pos.coords.longitude;
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=cs')
        .then(function(r){return r.json()})
        .then(function(d){var a=d.address;locName=a.city||a.town||a.village||a.municipality||'GPS';el('locname').textContent=locName})
        .catch(function(){})
        .finally(function(){loadWeather()});
    },
    function(){loadWeather()},{timeout:7000}
  );
}
function start(){el('locname').textContent=locName;loadWeather()}
start();
