<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pujde plachtit?</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#050c18;color:#c8daf0;font-family:system-ui,sans-serif}#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}#errbox{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center}#app{display:none}header{padding:20px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(120,180,255,.08);position:sticky;top:0;background:rgba(5,12,24,.96);z-index:10}.ttl{font-size:17px;font-weight:800;letter-spacing:2px;color:#e8f4ff}.sub{font-size:9px;color:#4a6180;letter-spacing:2px;margin-top:1px}.lbtn{background:rgba(91,173,255,.08);border:1px solid rgba(91,173,255,.2);border-radius:18px;padding:5px 11px;cursor:pointer;font-size:11px;color:#5badff;font-weight:600}.meta{display:flex;justify-content:space-between;padding:7px 18px 0}.upd{font-size:9px;color:#2a3d56}.ref{background:none;border:1px solid rgba(120,180,255,.1);color:#4a6180;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer}.sec{padding:14px 18px 0}.slbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#4a6180;margin-bottom:10px}.strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px}.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 8px;min-width:60px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:13px;cursor:pointer;color:inherit;outline:none}.chip.on{background:rgba(91,173,255,.1);border-color:rgba(91,173,255,.3)}.cbox{background:#0d1e38;border:1px solid rgba(120,180,255,.08);border-radius:15px;padding:14px 14px 8px}.cbars{display:flex;align-items:flex-end;gap:5px;height:64px}.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}.bb{width:100%;border-radius:4px 4px 0 0}.bdays{display:flex;gap:5px;margin-top:3px}.bd{flex:1;text-align:center;font-size:9px}.hero{background:#0d1e38;border:1px solid rgba(120,180,255,.1);border-radius:18px;padding:18px}.htop{display:flex;align-items:center;margin-bottom:14px}.hday{font-size:28px;font-weight:800;color:#e8f4ff;flex:1}.hvd{display:inline-block;padding:3px 12px;border-radius:18px;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:14px}.srow{display:flex;align-items:center;gap:14px;margin-bottom:16px}.tbig{font-size:38px;font-weight:800;color:#ff9100;line-height:1}.gg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.gb{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:10px 12px}.gl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a6180;margin-bottom:5px}.gv{font-size:22px;font-weight:800;line-height:1}.gu{font-size:10px;color:#4a6180;margin-left:2px}.gs{font-size:10px;color:#2a3d56;margin-top:3px}.bt{background:#080f1a;border-radius:3px;height:4px;overflow:hidden;margin-top:6px}.bf{height:100%;border-radius:3px}.tbrs{display:flex;gap:3px;align-items:flex-end;margin-top:5px}.tbr{width:7px;border-radius:2px}.wrow{display:flex;align-items:center;gap:9px;margin-top:4px}.spin{width:38px;height:38px;border:3px solid #0f1e35;border-top-color:#5badff;border-radius:50%;animation:sp .8s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.ltxt{font-size:11px;color:#4a6180;letter-spacing:2px}.emsg{font-size:12px;color:#4a6180;line-height:1.7;max-width:320px;word-break:break-all}.btn{padding:10px 22px;border-radius:10px;background:#5badff;color:#050c18;font-weight:700;font-size:13px;border:none;cursor:pointer}#ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,12,24,.9);align-items:flex-end;justify-content:center}#ov.open{display:flex}#modal{width:100%;max-width:520px;background:#0d1e38;border:1px solid rgba(91,173,255,.2);border-radius:20px 20px 0 0;padding:24px 18px 38px;position:relative}.mtitle{font-size:17px;font-weight:800;color:#e8f4ff;margin-bottom:3px}.msub{font-size:11px;color:#4a6180;margin-bottom:16px}.mrow{display:flex;gap:7px;margin-bottom:11px}.mi{flex:1;background:#091526;border:1px solid rgba(91,173,255,.2);border-radius:10px;padding:10px 13px;color:#c8daf0;font-size:14px;outline:none}.mb{background:#5badff;color:#050c18;border:none;border-radius:10px;padding:10px 14px;font-weight:700;font-size:13px;cursor:pointer}.mrs{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}.mr{background:rgba(91,173,255,.05);border:1px solid rgba(91,173,255,.1);border-radius:10px;padding:10px 13px;cursor:pointer}.mrn{font-size:14px;font-weight:600;color:#e8f4ff}.mrd{font-size:11px;color:#4a6180;margin-top:1px}.mre{font-size:13px;color:#4a6180;text-align:center;padding:16px 0}.mgps{width:100%;margin-top:9px;background:none;border:1px solid rgba(91,173,255,.15);border-radius:10px;padding:9px;color:#5badff;font-size:13px;font-weight:600;cursor:pointer}.mclose{position:absolute;top:14px;right:16px;background:none;border:none;color:#4a6180;font-size:20px;cursor:pointer}</style></head><body>
<div id="loading"><div style="font-size:32px">&#x1F6E9;</div><div class="spin"></div><div class="ltxt" id="lmsg">Nactavam...</div></div>
<div id="errbox"><div style="font-size:36px">&#x26A0;</div><div class="emsg" id="emsg">Chyba</div><button class="btn" onclick="start()">Zkusit znovu</button></div>
<div id="ov" onclick="if(event.target===this)closeModal()"><div id="modal"><button class="mclose" onclick="closeModal()">&#x2715;</button><div class="mtitle">Zmenit misto</div><div class="msub">Zadej mesto nebo letiste</div><div class="mrow"><input class="mi" id="mi" type="text" placeholder="Brno, Pribram..."/><button class="mb" id="mbtn" onclick="doSearch()">Hledat</button></div><div class="mrs" id="mrs"></div><button class="mgps" onclick="useGPS()">&#x1F4CD; GPS poloha</button></div></div>
<div style="max-width:520px;margin:0 auto;padding-bottom:60px"><div id="app">
<header><div><div class="ttl">&#x1F6E9; PUJDE PLACHTIT?</div><div class="sub">POCASI PRO VETRONE</div></div><div class="lbtn" onclick="openModal()">&#x1F4CD; <span id="locname">Sobeslav</span></div></header>
<div class="meta"><span class="upd" id="upd"></span><button class="ref" onclick="loadWeather()">&#x21BB; Obnovit</button></div>
<div class="sec"><div class="slbl">5 dni</div><div class="strip" id="strip"></div></div>
<div class="sec"><div class="cbox"><div class="slbl" style="margin-bottom:7px">Skore letani</div><div class="cbars" id="cbars"></div><div class="bdays" id="bdays"></div></div></div>
<div class="sec"><div class="slbl" id="hlbl">Detail</div><div class="hero" id="hero"></div></div>
</div></div>
<script>
var days=[],sel=0,lat=49.2489,lon=14.7203,locName='Letiste Sobeslav';
var DS=['Ne','Po','Ut','St','Ct','Pa','So'],DF=['Nedele','Pondeli','Utery','Streda','Ctvrtek','Patek','Sobota'];
function el(id){return document.getElementById(id)}
function showLoading(m){el('loading').style.display='flex';el('errbox').style.display='none';el('app').style.display='none';if(m)el('lmsg').textContent=m}
function showApp(){el('loading').style.display='none';el('errbox').style.display='none';el('app').style.display='block'}
function showError(m){el('loading').style.display='none';el('errbox').style.display='flex';el('emsg').textContent=m}
function avg(a){return a.length?a.reduce(function(x,y){return x+y})/a.length:0}
function score(d){var s=50;if(d.tb>1800)s+=22;else if(d.tb>1200)s+=14;else if(d.tb>700)s+=6;else s-=10;s+=Math.min(d.ts*7,22);if(d.wind<5)s-=8;else if(d.wind<=20)s+=10;else if(d.wind>40)s-=28;else if(d.wind>30)s-=14;if(d.cloud>=25&&d.cloud<=55)s+=8;else if(d.cloud>75)s-=12;s+=Math.min(d.vis/2,10);s-=d.rain*0.5;if(d.tmax>=18&&d.tmax<=32)s+=8;else if(d.tmax<10)s-=14;return Math.max(0,Math.min(100,Math.round(s)))}
function verd(s){if(s>=78)return{l:'Vyborne',c:'#00e676',bg:'rgba(0,230,118,.12)'};if(s>=60)return{l:'Dobre',c:'#ffd740',bg:'rgba(255,215,64,.10)'};if(s>=40)return{l:'Slabe',c:'#ff9100',bg:'rgba(255,145,0,.10)'};return{l:'Neletejte',c:'#ff3d5a',bg:'rgba(255,61,90,.10)'}}
function wico(c){if(c===0)return'&#x2600;';if(c<=2)return'&#x26C5;';if(c===3)return'&#x2601;';if(c<=49)return'&#x1F32B;';if(c<=67)return'&#x1F327;';if(c<=77)return'&#x2744;';if(c<=82)return'&#x1F326;';return'&#x26C8;'}
function wdl(d){return['S','SSV','SV','VSV','V','VJV','JV','JJV','J','JJZ','JZ','ZJZ','Z','ZSZ','SZ','SSZ'][Math.round(d/22.5)%16]}
function ring(s,c){var r=32,ci=2*Math.PI*r,d=s/100*ci;return'<div style="position:relative;width:80px;height:80px;flex-shrink:0"><svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg)"><circle cx="40" cy="40" r="'+r+'" fill="none" stroke="#0d1828" stroke-width="7"/><circle cx="40" cy="40" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="7" stroke-dasharray="'+d+' '+ci+'" stroke-linecap="round"/></svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:20px;font-weight:800;color:'+c+'">'+s+'</span><span style="font-size:8px;color:#4a6180">/100</span></div></div>'}
function arrow(d){return'<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="none" stroke="#2a3d56" stroke-width="1"/><g transform="rotate('+d+',14,14)"><polygon points="14,3 17,15 14,12 11,15" fill="#5badff"/></g></svg>'}
function tbars(ts){var h='<div class="tbrs">';for(var i=0;i<5;i++){var lit=i<Math.round(ts),ht=8+i*6;h+='<div class="tbr" style="height:'+ht+'px;background:'+(lit?'#00e676':'#0d1828')+'"></div>'}return h+'</div>'}
function bar(p,c){return'<div class="bt"><div class="bf" style="width:'+p+'%;background:'+c+'"></div></div>'}
function render(){
  var s2=el('strip');s2.innerHTML='';
  days.forEach(function(d,i){var s=score(d),v=verd(s);var b=document.createElement('button');b.className='chip'+(i===sel?' on':'');b.innerHTML='<span style="font-size:9px;color:#4a6180">'+d.lbl+'</span><span style="font-size:19px">'+wico(d.code)+'</span><span style="font-size:16px;font-weight:800;color:'+v.c+'">'+s+'</span><span style="font-size:8px;font-weight:700;padding:2px 6px;border-radius:9px;background:'+v.bg+';color:'+v.c+'">'+v.l+'</span><span style="font-size:10px">'+d.tmax+'C</span>';b.onclick=function(){sel=i;render()};s2.appendChild(b)});
  var bw=el('cbars'),bd=el('bdays');bw.innerHTML='';bd.innerHTML='';
  days.map(score).forEach(function(s,i){var v=verd(s),h=Math.max(4,Math.round(s/100*60)),a=i===sel;var col=document.createElement('div');col.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer';col.innerHTML='<span style="font-size:9px;font-weight:700;color:'+(a?v.c:v.c+'66')+'">'+s+'</span><div style="width:100%;border-radius:4px 4px 0 0;height:'+h+'px;background:'+(a?v.c:v.c+'33')+'"></div>';col.onclick=function(){sel=i;render()};bw.appendChild(col);var lbl=document.createElement('div');lbl.style.cssText='flex:1;text-align:center;font-size:9px;color:'+(i===sel?'#c8daf0':'#4a6180');lbl.textContent=days[i].lbl;bd.appendChild(lbl)});
  var d=days[sel],s=score(d),v=verd(s),vc=d.vis>=8?'#00e676':d.vis>=4?'#ffd740':'#ff3d5a';
  el('hlbl').textContent='Detail - '+d.full;
  el('hero').style.borderColor=v.c+'44';
  el('hero').innerHTML='<div class="htop"><div class="hday">'+d.full+'</div><span style="font-size:36px">'+wico(d.code)+'</span></div><div class="hvd" style="background:'+v.bg+';color:'+v.c+'">'+v.l+'</div><div class="srow">'+ring(s,v.c)+'<div><div class="tbig">'+d.tmax+'&#xB0;C</div><div style="font-size:11px;color:#4a6180;margin-top:2px">min '+d.tmin+'&#xB0;C</div></div></div><div class="gg"><div class="gb"><div class="gl">Termika</div>'+tbars(d.ts)+'<div class="gs">Sila: '+d.ts.toFixed(1)+'/5</div></div><div class="gb"><div class="gl">Zakladna CU</div><span class="gv" style="color:#00e676">'+d.tb+'</span><span class="gu">m</span>'+bar(Math.min(d.tb/2500*100,100),'#00e676')+'</div><div class="gb"><div class="gl">Vitr</div><div class="wrow">'+arrow(d.wdir)+'<div><span class="gv" style="color:#5badff">'+d.wind+'</span><span class="gu">km/h</span><div class="gs">'+wdl(d.wdir)+'</div></div></div>'+bar(Math.min(d.wind/60*100,100),'#5badff')+'</div><div class="gb"><div class="gl">Oblacnost</div><span class="gv" style="color:#ffd740">'+d.cloud+'</span><span class="gu">%</span>'+bar(d.cloud,'#ffd740')+'</div><div class="gb"><div class="gl">Dohlednost</div><span class="gv" style="color:'+vc+'">'+d.vis+'</span><span class="gu">km</span>'+bar(Math.min(d.vis/20*100,100),vc)+'</div><div class="gb"><div class="gl">Srazky</div><span class="gv" style="color:'+(d.rain>50?'#ff3d5a':'#4a6180')+'">'+d.rain+'</span><span class="gu">%</span>'+bar(d.rain,'#ff3d5a')+'</div></div>';
}
function loadWeather(){
  showLoading('Nactavam...');
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max,wind_direction_10m_dominant,precipitation_probability_max,cloud_cover_mean&hourly=boundary_layer_height,cape,visibility&wind_speed_unit=kmh&timezone=auto&forecast_days=5')
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(r.status+' '+t.slice(0,150))});return r.json()})
  .then(function(data){
    var dl=data.daily,hl=data.hourly,n=dl.time.length;days=[];
    for(var i=0;i<n;i++){
      var h0=i*24,blh=[],cap=[],vis=[];
      for(var h=h0+10;h<h0+16;h++){if(hl.boundary_layer_height&&hl.boundary_layer_height[h]!=null)blh.push(hl.boundary_layer_height[h]);if(hl.cape&&hl.cape[h]!=null)cap.push(hl.cape[h]);if(hl.visibility&&hl.visibility[h]!=null)vis.push(hl.visibility[h])}
      var tb=blh.length?Math.round(avg(blh)):Math.max(400,Math.round((dl.temperature_2m_max[i]-8)*120));
      var date=new Date(dl.time[i]+'T12:00:00'),dow=date.getDay();
      days.push({lbl:i===0?'Dnes':i===1?'Zitra':DS[dow],full:i===0?'Dnes':i===1?'Zitra':DF[dow],code:dl.weather_code[i],tmax:Math.round(dl.temperature_2m_max[i]),tmin:Math.round(dl.temperature_2m_min[i]),wind:Math.round(dl.wind_speed_10m_max[i]),wdir:Math.round(dl.wind_direction_10m_dominant[i]),rain:dl.precipitation_probability_max[i]||0,cloud:Math.round(dl.cloud_cover_mean[i]||50),vis:vis.length?Math.round(avg(vis)/100)/10:15,cape:avg(cap),tb:tb,ts:Math.min(avg(cap)/400,5)});
    }
    sel=0;var now=new Date();
    el('upd').textContent='Aktualizovano: '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    render();showApp();
  }).catch(function(e){showError('Chyba: '+e.message)});
}
function openModal(){el('ov').classList.add('open');el('mrs').innerHTML='';el('mi').value='';setTimeout(function(){el('mi').focus()},200)}
function closeModal(){el('ov').classList.remove('open')}
el('mi').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});
function doSearch(){var q=el('mi').value.trim();if(!q)return;var btn=el('mbtn'),res=el('mrs');btn.disabled=true;btn.textContent='...';res.innerHTML='<div class="mre">Hledam...</div>';fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&accept-language=cs').then(function(r){return r.json()}).then(function(data){if(!data.length){res.innerHTML='<div class="mre">Zadne vysledky.</div>';return}res.innerHTML='';data.forEach(function(item){var parts=item.display_name.split(',');var div=document.createElement('div');div.className='mr';div.innerHTML='<div class="mrn">'+parts[0].trim()+'</div><div class="mrd">'+parts.slice(1,3).join(',').trim()+'</div>';div.onclick=function(){closeModal();lat=parseFloat(item.lat);lon=parseFloat(item.lon);locName=parts[0].trim();el('locname').textContent=locName;loadWeather()};res.appendChild(div)})}).catch(function(){res.innerHTML='<div class="mre">Chyba.</div>'}).finally(function(){btn.disabled=false;btn.textContent='Hledat'})}
function useGPS(){closeModal();showLoading('GPS...');navigator.geolocation.getCurrentPosition(function(pos){lat=pos.coords.latitude;lon=pos.coords.longitude;fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=cs').then(function(r){return r.json()}).then(function(d){var a=d.address;locName=a.city||a.town||a.village||'GPS';el('locname').textContent=locName}).catch(function(){}).finally(function(){loadWeather()})},function(){loadWeather()},{timeout:6000})}
function start(){el('locname').textContent=locName;loadWeather()}
start();
</script></body></html>
